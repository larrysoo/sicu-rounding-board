<style>
/* === Standalone theme: warm dark (#262624) + light off-white === */
:root {
  --color-background-primary: #ffffff;
  --color-background-secondary: #F5F4EE;
  --color-text-primary: #1E1E1C;
  --color-text-secondary: #6B6960;
  --color-text-tertiary: #999791;
  --color-border-secondary: #D8D6CD;
  --color-border-tertiary: #E8E6DD;
  --color-background-info: #EEEDFE;
  --color-text-info: #3C3489;
  --color-border-info: #7F77DD;
  --color-background-success: #E1F5EE;
  --color-text-success: #085041;
  --color-border-success: #1D9E75;
  --color-background-warning: #FAEEDA;
  --color-text-warning: #633806;
  --color-border-warning: #EF9F27;
  --color-background-danger: #FCEBEB;
  --color-text-danger: #791F1F;
  --color-border-danger: #E24B4A;
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --border-radius-md: 6px;
  --border-radius-lg: 10px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --color-background-primary: #1E1E1C;
    --color-background-secondary: #2A2A27;
    --color-text-primary: #F2F0E8;
    --color-text-secondary: #B8B5AC;
    --color-text-tertiary: #807D74;
    --color-border-secondary: #3A3A35;
    --color-border-tertiary: #2F2F2C;
    --color-background-info: #1F1B3D;
    --color-background-success: #0F2B22;
    --color-background-warning: #2E1F0D;
    --color-background-danger: #2C1212;
  }
}
* { box-sizing: border-box }
html, body { margin: 0; padding: 0 }
body {
  font-family: var(--font-sans);
  background: var(--color-background-secondary);
  color: var(--color-text-primary);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
.app-shell { max-width: 1400px; margin: 0 auto; padding: 16px }
.sr-only { position: absolute; left: -9999px }
.app-bar {
  background: #262624;
  color: #F2F0E8;
  padding: 8px 16px;
  margin: -16px -16px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.app-bar-title {
  font-size: 15px;
  font-weight: 500;
  letter-spacing: 0.02em;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.app-bar-title i { color: #E24B4A; font-size: 18px }
.app-bar-ver { font-size: 11px; color: #999791 }
</style>

function psDay(p,t){const dy=p.days[t];if(!dy)return '';const ph=rP(p,t);const v=VIS(dy,p);const vg=vG(v.t);const k=kd(p,t);const dl=dy?.renal?.dialysis;const m=dy?.hemo?.monitor||{};const rm=dy?.renal?.monitor||{};const lm=dy?.lyte?.monitor||{};const nm=dy?.neuro?.monitor||{};const hm=dy?.heme?.monitor||{};const rsp=dy?.resp?.monitor||{};const im=dy?.inf?.monitor||{};const ab=latestABG(p,t);const an=ab?analyzeABG(ab):null;const bal=(rm.intake_ml!=null&&rm.uo_ml!=null)?(rm.intake_ml-rm.uo_ml):null;const cb=cB(p,t);const iT=!!nm.gcs_v_t;const vEff=iT?1:nm.gcs_v;const gT=(nm.gcs_e!=null&&vEff!=null&&nm.gcs_m!=null)?(nm.gcs_e+vEff+nm.gcs_m):null;const vas=dy?.hemo?.vasoactives||[];const mcs=dy?.hemo?.mcs||[];const aA=(p.antibiotics||[]).filter(a=>iA(a,t));const al=(p.pastHx?.allergy||[]).map(a=>a.text).join(', ')||'NKDA';const nrs=NRS(dy.nutr?.nrs);const ft=feedTotals(dy.nutr||{});const kPct=achPct(ft.kcal,dy.nutr?.target_kcal);const pPct=achPct(ft.protein,dy.nutr?.target_protein);const aP=[];ORG.forEach(o=>{(dy?.[o.i]?.plan||[]).filter(pl=>!pl.done).forEach(pl=>aP.push({s:o.l,t:pl.text}))});const giSx=GI_SX.filter(g=>dy.nutr?.gi&&dy.nutr.gi[g.k]).map(g=>g.l);
  let h='<div class="psh"><div><div class="pst">SICU Daily Round Sheet</div><div class="pss">'+t+' · '+new Date().toLocaleString('sv-SE').slice(0,16)+'</div></div><div class="psi"><strong>'+E(p.name)+'</strong> · '+p.age+p.sex+' · '+(p.weight_kg||'?')+' kg<br>'+E(p.bed)+' · MRN '+E(p.mrn)+' · ICU d'+p.los+'</div></div>';
  h+='<div class="pse"><div class="pst2">Background</div><dl class="psg"><dt>Admit Dx</dt><dd>'+E(p.admitDx)+'</dd><dt>PMH</dt><dd>'+E(p.pmh)+'</dd><dt>Allergy</dt><dd>'+E(al)+'</dd><dt>Status</dt><dd>'+(ph?'<span class="psp '+(ph.c==='R'?'danger':ph.c==='O'?'warning':'success')+'">'+ph.l+'</span>':'')+'<span class="psp '+(vg.cls==='hi'?'danger':vg.cls==='mod'?'warning':'success')+'">VIS '+v.t+'</span>'+(an&&an.pf!=null&&an.pf<=300?'<span class="psp '+(an.pf<=200?'danger':'warning')+'">'+(an.pf<=100?'severe':an.pf<=200?'mod':'mild')+' ARDS</span>':'')+(k>0?'<span class="psp '+(k>=2?'danger':'warning')+'">KDIGO '+k+'</span>':'')+(dl?'<span class="psp">'+dl+'</span>':'')+(nrs.risk?'<span class="psp warning">NRS '+nrs.total+'</span>':'')+mcs.map(x=>'<span class="psp danger">'+x.type+'</span>').join('')+'</dd></dl></div>';
  const ninf=dy?.neuro?.infusions||[];h+='<div class="pse"><div class="pst2">Neuro · Hemo · Resp</div><dl class="psg"><dt>Neuro</dt><dd>GCS '+(gT||'—')+(iT?'T':'')+' · RASS '+(nm.rass??'—')+'</dd><dt>Sed/Anal/Para</dt><dd>'+(ninf.length?ninf.map(v=>{const d=vsLatestDose(p,v);const ps=vsPresetFor(p,v.presetId);const u=ps?ps.out:(v.unit||'');return v.drug.split(' ')[0]+' '+(d==null?'—':vsFmtDose(d))+(u?' '+u:'')}).join(' · '):'<em>none</em>')+'</dd><dt>Vitals</dt><dd>MAP '+(m.map??'—')+' · HR '+(m.hr??'—')+' · Lac '+(m.lac??'—')+'</dd><dt>Vasoactive</dt><dd>'+(vas.length?vas.map(v=>{const d=vsLatestDose(p,v);const ps=vsPresetFor(p,v.presetId);const u=ps?ps.out:(v.unit||'');return v.drug.split(' ')[0]+' '+(d==null?'—':vsFmtDose(d))+(u?' '+u:'')}).join(' · '):'<em>none</em>')+'</dd><dt>MCS</dt><dd>'+(mcs.length?mcs.map(x=>x.type+(x.subtype?' ('+x.subtype+')':'')).join('<br>'):'<em>none</em>')+'</dd><dt>Resp</dt><dd>SpO₂ '+(rsp.spo2??'—')+'% · PEEP '+(rsp.peep??'—')+' · FiO₂ '+(rsp.fio2??'—')+'%</dd></dl></div>';
  h+='<div class="pse"><div class="pst2">Acid-base</div>';if(ab){h+='<dl class="psg"><dt>ABG @ '+(ab.time||'?')+'</dt><dd>FiO₂ '+(ab.fio2||'?')+'%</dd><dt>Gases</dt><dd>pH <strong>'+ab.ph.toFixed(2)+'</strong> · pCO₂ <strong>'+ab.pco2+'</strong> · pO₂ <strong>'+ab.po2+'</strong> · HCO₃ <strong>'+ab.hco3+'</strong></dd>'+(an?'<dt>Interpretation</dt><dd>'+E(an.summary)+(an.ag!=null?' · AG '+an.ag:'')+(an.pf!=null?' · P/F '+an.pf:'')+'</dd>':'')+'</dl>'}else h+='<p style="color:var(--color-text-tertiary);font-style:italic;font-size:12px">No ABG today.</p>';h+='</div>';
  h+='<div class="pse"><div class="pst2">Renal · Fluid</div><dl class="psg"><dt>Renal</dt><dd>Cr '+(rm.cr??'—')+' · KDIGO '+(k??'—')+' · '+(dl||'no RRT')+'</dd><dt>UO/Bal</dt><dd>UO '+(rm.uo_ml??'—')+' mL · Today '+(bal!=null?(bal>0?'+':'')+bal:'—')+' · Cum '+(cb>0?'+':'')+cb.toLocaleString()+'</dd><dt>Lab</dt><dd>Na '+(lm.na??'—')+' · K '+(lm.k??'—')+' · Cl '+(lm.cl??'—')+' · iCa '+(lm.ica??'—')+'</dd></dl></div>';
  h+='<div class="pse"><div class="pst2">Nutrition</div><dl class="psg"><dt>NRS-2002</dt><dd>'+(nrs.init?'<strong>'+nrs.total+'</strong> ('+(nrs.risk?'at risk':'no risk')+')':'<em>not screened</em>')+'</dd><dt>Target</dt><dd>'+fmtN(dy.nutr?.target_kcal,0)+' kcal · '+fmtN(dy.nutr?.target_protein,1)+' g protein'+(dy.nutr?.rq!=null?' · RQ '+dy.nutr.rq.toFixed(2):'')+'</dd><dt>Achievement</dt><dd>'+ft.kcal+' kcal ('+(kPct==null?'—':kPct+'%')+') · '+ft.protein+' g ('+(pPct==null?'—':pPct+'%')+')</dd><dt>Feeding</dt><dd>'+((dy.nutr?.feedings||[]).filter(f=>f.active).map(f=>f.route+' '+E(f.formula||'')+' — '+f.kcal+' kcal/'+f.protein+'g').join('<br>')||'<em>none</em>')+'</dd>'+(giSx.length?'<dt>GI sx</dt><dd>'+giSx.map(s=>'<span class="psp warning">'+s+'</span>').join('')+'</dd>':'')+'</dl></div>';
  h+='<div class="pse"><div class="pst2">Heme · Infection</div><dl class="psg"><dt>CBC</dt><dd>Hb '+(hm.hb??'—')+' · Plt '+(hm.plt??'—')+' · INR '+(hm.inr??'—')+'</dd><dt>Markers</dt><dd>Tmax '+(im.tmax??'—')+'°C · WBC '+(im.wbc??'—')+' · CRP '+(im.crp??'—')+'</dd><dt>Antibiotics</dt><dd>'+(aA.length?aA.map(a=>a.drug+' '+(a.dose||'')+' d'+dot(a,t)).join('<br>'):'<em>none</em>')+'</dd></dl></div>';
  const ev=dy?.events||{e24:[],e8:[]};const evRen=arr=>arr.length?'<ul style="margin:0;padding-left:18px;font-size:11.5px;line-height:1.5">'+arr.map(e=>'<li>'+(e.time?'<strong>'+E(e.time)+'</strong> · ':'')+E(e.text)+'</li>').join('')+'</ul>':'<em style="font-size:11.5px">none</em>';h+='<div class="pse"><div class="pst2">Events</div><div style="margin-bottom:6px"><div style="font-size:11px;font-weight:600;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.04em">Last 24 h</div>'+evRen(ev.e24||[])+'</div><div><div style="font-size:11px;font-weight:600;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.04em">Last 8 h</div>'+evRen(ev.e8||[])+'</div></div>';
  h+='<div class="pse"><div class="pst2">Plan today</div><ol style="margin:0;padding-left:22px;font-size:12.5px;line-height:1.6">'+(aP.length?aP.map(pl=>'<li><strong>['+pl.s+']</strong> '+E(pl.t)+'</li>').join(''):'<li><em>No pending plan items</em></li>')+'</ol></div>';
  h+='<div class="pse" style="margin-top:18px;border-top:.5px solid var(--color-border-tertiary);padding-top:10px;font-size:10px;color:var(--color-text-tertiary);display:flex;justify-content:space-between"><span>Attending: ___________________ Fellow: ___________________</span><span>Signature: ___________________</span></div>';
  return h}

/* v14.3 — Categorical longitudinal timeline (last N days or whole stay) */
function psRange(p,days,title,subtitle){if(!days.length)return '<p class="em">No days in range.</p>';
  /* Helper: header row of dates */
  const dateHdr=days.map(dk=>{const d=new Date(dk+'T00:00:00');const wd=d.toLocaleDateString('en-US',{weekday:'short'});const md=d.toLocaleDateString('en-US',{month:'numeric',day:'numeric'});return '<th><div style="font-weight:700">'+md+'</div><div style="font-size:9px;color:#666;font-weight:400">'+wd+'</div></th>'}).join('');
  /* Per-cell helpers */
  const cellEv=(dy)=>{const ev=dy?.events||{e24:[],e8:[]};const items=[...(ev.e8||[]),...(ev.e24||[])];if(!items.length)return '<td class="tlc-em">—</td>';return '<td>'+items.map(e=>'<div style="margin-bottom:2px">'+(e.time?'<strong>'+E(e.time)+'</strong> ':'')+E(e.text)+'</div>').join('')+'</td>'};
  const cellVaso=(dy)=>{const vas=dy?.hemo?.vasoactives||[];if(!vas.length)return '<td class="tlc-em">—</td>';return '<td>'+vas.map(v=>{const d=vsLatestDose(p,v);const ps=vsPresetFor(p,v.presetId);const u=ps?ps.out:(v.unit||'');return '<div>'+v.drug.split(' ')[0]+' '+(d==null?'—':vsFmtDose(d))+(u?' '+u.split('/')[0]:'')+'</div>'}).join('')+'</td>'};
  const cellSAP=(dy)=>{const inf=dy?.neuro?.infusions||[];if(!inf.length)return '<td class="tlc-em">—</td>';return '<td>'+inf.map(v=>{const d=vsLatestDose(p,v);const ps=vsPresetFor(p,v.presetId);const u=ps?ps.out:(v.unit||'');return '<div>'+v.drug.split(' ')[0]+' '+(d==null?'—':vsFmtDose(d))+(u?' '+u.split('/')[0]:'')+'</div>'}).join('')+'</td>'};
  const cellAbx=(dk)=>{const aA=(p.antibiotics||[]).filter(a=>iA(a,dk));if(!aA.length)return '<td class="tlc-em">—</td>';return '<td>'+aA.map(a=>'<div>'+E(a.drug.split(' ')[0])+' d'+dot(a,dk)+'</div>').join('')+'</td>'};
  const cellABG=(dy)=>{const ab=dy?.abg?.panels?.[dy.abg.panels.length-1];if(!ab)return '<td class="tlc-em">—</td>';const an=analyzeABG(ab);return '<td><div>pH '+(ab.ph!=null?ab.ph.toFixed(2):'—')+' / '+(ab.pco2??'—')+'</div><div>pO₂ '+(ab.po2??'—')+' / HCO₃ '+(ab.hco3??'—')+'</div>'+(an&&an.pf!=null?'<div style="font-size:9px;color:#666">P/F '+an.pf+'</div>':'')+'</td>'};
  const cellHemo=(dy)=>{const m=dy?.hemo?.monitor||{};const has=m.map!=null||m.hr!=null||m.lac!=null;if(!has)return '<td class="tlc-em">—</td>';return '<td><div>MAP '+(m.map??'—')+' · HR '+(m.hr??'—')+'</div>'+(m.lac!=null?'<div>Lac '+m.lac+'</div>':'')+'</td>'};
  const cellRenal=(dy,dk)=>{const rm=dy?.renal?.monitor||{};const k=kd(p,dk);const dl=dy?.renal?.dialysis;const bal=(rm.intake_ml!=null&&rm.uo_ml!=null)?(rm.intake_ml-rm.uo_ml):null;const has=rm.cr!=null||rm.uo_ml!=null||dl;if(!has)return '<td class="tlc-em">—</td>';return '<td>'+(rm.cr!=null?'<div>Cr '+rm.cr+(k>0?' (K'+k+')':'')+'</div>':'')+(rm.uo_ml!=null?'<div>UO '+rm.uo_ml+' mL</div>':'')+(bal!=null?'<div style="font-size:9px;color:#666">Bal '+(bal>0?'+':'')+bal+'</div>':'')+(dl?'<div style="font-weight:600">'+dl+'</div>':'')+'</td>'};
  const cellHeme=(dy)=>{const hm=dy?.heme?.monitor||{};const has=hm.hb!=null||hm.plt!=null;if(!has)return '<td class="tlc-em">—</td>';return '<td><div>Hb '+(hm.hb??'—')+' Plt '+(hm.plt??'—')+'</div>'+(hm.inr!=null?'<div style="font-size:9px;color:#666">INR '+hm.inr+'</div>':'')+'</td>'};
  const cellInf=(dy)=>{const im=dy?.inf?.monitor||{};const has=im.tmax!=null||im.wbc!=null||im.crp!=null;if(!has)return '<td class="tlc-em">—</td>';return '<td><div>'+(im.tmax!=null?'T '+im.tmax+'°':'')+(im.wbc!=null?' WBC '+im.wbc:'')+'</div>'+(im.crp!=null?'<div style="font-size:9px;color:#666">CRP '+im.crp+'</div>':'')+'</td>'};
  const cellNutr=(dy)=>{const ft=feedTotals(dy?.nutr||{});const kPct=achPct(ft.kcal,dy?.nutr?.target_kcal);const pPct=achPct(ft.protein,dy?.nutr?.target_protein);if(!ft.kcal&&!ft.protein)return '<td class="tlc-em">—</td>';return '<td><div>'+ft.kcal+' kcal'+(kPct!=null?' ('+kPct+'%)':'')+'</div><div style="font-size:9px;color:#666">'+ft.protein+' g'+(pPct!=null?' ('+pPct+'%)':'')+'</div></td>'};
  const cellSurg=(dk)=>{const sgs=(p.surgeries||[]).filter(s=>s.date===dk);if(!sgs.length)return '<td class="tlc-em">—</td>';return '<td>'+sgs.map(s=>'<div style="font-weight:600">'+E(s.proc.length>40?s.proc.slice(0,38)+'…':s.proc)+'</div>').join('')+'</td>'};
  const cellPlan=(dy)=>{const items=[];ORG.forEach(o=>{(dy?.[o.i]?.plan||[]).forEach(pl=>items.push({s:o.l,t:pl.text,done:pl.done}))});if(!items.length)return '<td class="tlc-em">—</td>';return '<td>'+items.map(pl=>'<div'+(pl.done?' style="text-decoration:line-through;color:#999"':'')+'>['+pl.s.slice(0,3)+'] '+E(pl.t.length>35?pl.t.slice(0,33)+'…':pl.t)+'</div>').join('')+'</td>'};

  let h='<div class="ps-rh"><div><div class="pst">'+E(title)+'</div><div class="pss">'+E(subtitle)+'</div></div><div class="psi"><strong>'+E(p.name)+'</strong> · '+p.age+p.sex+' · '+(p.weight_kg||'?')+' kg · '+E(p.bed)+'<br>MRN '+E(p.mrn)+' · Admit Dx: '+E(p.admitDx)+'</div></div>';
  h+='<table class="ps-tl"><thead><tr><th class="ps-tl-cat">Category</th>'+dateHdr+'</tr></thead><tbody>';
  const rows=[
    {lbl:'Events',cells:days.map(dk=>cellEv(p.days[dk]))},
    {lbl:'Vasoactive',cells:days.map(dk=>cellVaso(p.days[dk]))},
    {lbl:'Sed/Anal/Para',cells:days.map(dk=>cellSAP(p.days[dk]))},
    {lbl:'Antibiotics',cells:days.map(dk=>cellAbx(dk))},
    {lbl:'ABG',cells:days.map(dk=>cellABG(p.days[dk]))},
    {lbl:'Hemo',cells:days.map(dk=>cellHemo(p.days[dk]))},
    {lbl:'Renal/Fluid',cells:days.map(dk=>cellRenal(p.days[dk],dk))},
    {lbl:'Heme',cells:days.map(dk=>cellHeme(p.days[dk]))},
    {lbl:'Infection',cells:days.map(dk=>cellInf(p.days[dk]))},
    {lbl:'Nutrition',cells:days.map(dk=>cellNutr(p.days[dk]))},
    {lbl:'Surgery',cells:days.map(dk=>cellSurg(dk))},
    {lbl:'Plan',cells:days.map(dk=>cellPlan(p.days[dk]))}
  ];
  rows.forEach(r=>{h+='<tr><th class="ps-tl-cat">'+r.lbl+'</th>'+r.cells.join('')+'</tr>'});
  h+='</tbody></table>';
  h+='<div class="pse" style="margin-top:14px;border-top:.5px solid var(--color-border-tertiary);padding-top:8px;font-size:10px;color:var(--color-text-tertiary);display:flex;justify-content:space-between"><span>Attending: ___________________ Fellow: ___________________</span><span>Generated '+new Date().toLocaleString('sv-SE').slice(0,16)+'</span></div>';
  return h}

function rPS(){const p=cP();if(!p){document.getElementById('parea').innerHTML='<p class="em">No patient</p>';return}const allDays=Object.keys(p.days).sort();const t=allDays[allDays.length-1];const last7=allDays.slice(-7);
  let h='';
  /* Page 1: Today's daily round sheet */
  h+='<div class="psw">'+psDay(p,t)+'</div>';
  /* Page 2: Last 7 days categorical timeline */
  if(allDays.length>=2){h+='<div class="psw ps-page-break">'+psRange(p,last7,'SICU Weekly Summary',(last7.length===7?'Last 7 days':last7.length+'-day window')+' · '+last7[0]+' → '+last7[last7.length-1])+'</div>'}
  /* Page 3: Entire ICU stay categorical timeline */
  if(allDays.length>=2){h+='<div class="psw ps-page-break">'+psRange(p,allDays,'SICU Stay Summary','Full ICU course · '+allDays.length+' days · '+allDays[0]+' → '+t)+'</div>'}
  h+='<div class="np" style="margin-top:16px;text-align:center;display:flex;gap:8px;justify-content:center"><button class="btn pri" id="dp"><i class="ti ti-printer"></i> '+(allDays.length>=2?'Print all 3 pages':'Print page')+'</button><button class="btn" id="bl"><i class="ti ti-arrow-left"></i> Back</button></div>';
  document.getElementById('parea').innerHTML=h;document.getElementById('dp').onclick=()=>window.print();document.getElementById('bl').onclick=()=>{S.listMode='list';sv();rM()}}

function expJSON(){const data={version:"v14.3",exportedAt:new Date().toISOString(),vsPresets:S.vsPresets||[],patients:S.patients};const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='sicu_rounds_'+new Date().toISOString().slice(0,10)+'.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url)}
function impJSON(file){const r=new FileReader();r.onload=(e)=>{try{const d=JSON.parse(e.target.result);if(!d.patients||!Array.isArray(d.patients))throw new Error('Invalid format');const presetCount=Array.isArray(d.vsPresets)?d.vsPresets.length:0;if(!confirm('Import '+d.patients.length+' patient(s)'+(presetCount?' + '+presetCount+' preset(s) (merged, not replaced)':'')+'?\n\nPatient data REPLACES current; preset library is MERGED.'))return;d.patients.forEach(mg);S.patients=d.patients;/* Merge presets — don't overwrite existing */if(presetCount){S.vsPresets=S.vsPresets||[];d.vsPresets.forEach(ps=>{const dup=S.vsPresets.find(x=>x.drug.toLowerCase()===ps.drug.toLowerCase()&&+x.amt===+ps.amt&&x.amtu===ps.amtu&&+x.vol===+ps.vol&&x.out===ps.out);if(!dup)S.vsPresets.push({...ps,id:ps.id||ud('vsp'),cat:vsRemapCat(ps.cat)})})}S.currentId=d.patients[0]?.id;S.currentDay=S.currentId?Object.keys(d.patients[0].days).slice(-1)[0]:null;sv();rM();alert('Imported '+d.patients.length+' patient(s)'+(presetCount?', merged '+presetCount+' preset(s)':'')+'.')}catch(err){alert('Import failed: '+err.message)}};r.readAsText(file)}

document.getElementById('b-newpt').onclick=()=>oPatient();
document.getElementById('b-newday').onclick=nD;
document.getElementById('b-abg').onclick=()=>{if(!cP()){alert('No patient selected');return}S.currentOrgan='abg';if(S.listMode!=='list'){S.listMode='list';rM()}if(S.currentView!=='day'){S.currentView='day';rT();rVC()}oABG()};
document.getElementById('b-exp').onclick=expJSON;
document.getElementById('b-imp').onclick=()=>document.getElementById('fi').click();
document.getElementById('fi').onchange=(e)=>{if(e.target.files[0]){impJSON(e.target.files[0]);e.target.value=''}};
document.getElementById('b-reset').onclick=()=>{if(confirm('Reset? Current edits lost.')){localStorage.removeItem(SK);S=ld();sv();rM()}};
document.getElementById('vt-list').onclick=()=>{S.listMode='list';sv();rM()};
document.getElementById('vt-brd').onclick=()=>{S.listMode='brd';sv();rM()};
document.getElementById('vt-print').onclick=()=>{S.listMode='print';sv();rM()};
rM();
})();
