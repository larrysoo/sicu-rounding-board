<style>
/* === Standalone theme: warm dark (#262624) + light off-white === */
:root {
  --color-background-primary: #ffffff;
  --color-background-secondary: #F5F4EE;
  --color-text-primary: #1E1E1C;
  --color-text-secondary: #6B6960;
  --color-text-tertiary: #999791;
  --color-border-secondary: #D8D6CD;
  --color-border-tertiary: #E8E6DD;
  --color-background-info: #EEEDFE;
  --color-text-info: #3C3489;
  --color-border-info: #7F77DD;
  --color-background-success: #E1F5EE;
  --color-text-success: #085041;
  --color-border-success: #1D9E75;
  --color-background-warning: #FAEEDA;
  --color-text-warning: #633806;
  --color-border-warning: #EF9F27;
  --color-background-danger: #FCEBEB;
  --color-text-danger: #791F1F;
  --color-border-danger: #E24B4A;
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --border-radius-md: 6px;
  --border-radius-lg: 10px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --color-background-primary: #1E1E1C;
    --color-background-secondary: #2A2A27;
    --color-text-primary: #F2F0E8;
    --color-text-secondary: #B8B5AC;
    --color-text-tertiary: #807D74;
    --color-border-secondary: #3A3A35;
    --color-border-tertiary: #2F2F2C;
    --color-background-info: #1F1B3D;
    --color-background-success: #0F2B22;
    --color-background-warning: #2E1F0D;
    --color-background-danger: #2C1212;
  }
}
* { box-sizing: border-box }
html, body { margin: 0; padding: 0 }
body {
  font-family: var(--font-sans);
  background: var(--color-background-secondary);
  color: var(--color-text-primary);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
.app-shell { max-width: 1400px; margin: 0 auto; padding: 16px }
.sr-only { position: absolute; left: -9999px }
.app-bar {
  background: #262624;
  color: #F2F0E8;
  padding: 8px 16px;
  margin: -16px -16px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.app-bar-title {
  font-size: 15px;
  font-weight: 500;
  letter-spacing: 0.02em;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.app-bar-title i { color: #E24B4A; font-size: 18px }
.app-bar-ver { font-size: 11px; color: #999791 }
</style>

/* --- shared helpers --- */
/* txtN: clean number formatter — strips floating-point noise (1.0999999 → 1.1).
   Matches fmtN behavior: integers stay integers, decimals rounded to `dec` (default 1).
   Returns '—' for null/empty/NaN. Use this for ANY numeric monitor value. */
function txtN(v,dec){if(v==null||v===''||(typeof v==='number'&&isNaN(v)))return'—';if(typeof v!=='number'&&isNaN(+v))return String(v);const n=+v;if(Number.isInteger(n))return String(n);dec=dec==null?1:dec;return(Math.round(n*Math.pow(10,dec))/Math.pow(10,dec)).toString()}
function txtVal(v){return (v==null||v==='')?'—':String(v)}
function txtPad(s,n){s=String(s==null?'':s);if(s.length>=n)return s;return s+' '.repeat(n-s.length)}
function txtPadL(s,n){s=String(s==null?'':s);if(s.length>=n)return s;return ' '.repeat(n-s.length)+s}
function txtLine(c,n){return c.repeat(n)}

/* Build a structured record (mode-agnostic) for a single day */
function txtDayRecord(p,t){
  const dy=p.days[t]; if(!dy) return null;
  const ph=rP(p,t); const v=VIS(dy,p); const vg=vG(v.t); const k=kd(p,t);
  const dl=dy?.renal?.dialysis;
  const m=dy?.hemo?.monitor||{}; const rm=dy?.renal?.monitor||{};
  const lm=dy?.lyte?.monitor||{}; const nm=dy?.neuro?.monitor||{};
  const hm=dy?.heme?.monitor||{}; const rsp=dy?.resp?.monitor||{};
  const im=dy?.inf?.monitor||{};
  const ab=latestABG(p,t); const an=ab?analyzeABG(ab):null;
  const drT_=(dy?.renal?.drainages||[]).filter(x=>x.active!==false).reduce((a,x)=>a+drTotal(x),0);
  const ufT_=dl?ufTotal(dy.renal):0;
  const bal=(rm.intake_ml!=null&&rm.uo_ml!=null)?(rm.intake_ml-rm.uo_ml-drT_-ufT_-stoolOut(dy)+txfBalAdd(dy)):null;
  const cb=cB(p,t);
  const iT=!!nm.gcs_v_t; const vEff=iT?1:nm.gcs_v;
  const gT=(nm.gcs_e!=null&&vEff!=null&&nm.gcs_m!=null)?(nm.gcs_e+vEff+nm.gcs_m):null;
  const vas=dy?.hemo?.vasoactives||[]; const mcs=dy?.hemo?.mcs||[];
  const ninf=dy?.neuro?.infusions||[];
  const aA=(p.antibiotics||[]).filter(a=>iA(a,t));
  const al=(p.pastHx?.allergy||[]).map(a=>a.text).join(', ')||'NKDA';
  const nrs=NRS(dy.nutr?.nrs); const ft=feedTotals(dy.nutr||{});
  const kPct=achPct(ft.kcal,dy.nutr?.target_kcal);
  const pPct=achPct(ft.protein,dy.nutr?.target_protein);
  const aP=[]; ORG.forEach(o=>{(dy?.[o.i]?.plan||[]).filter(pl=>!pl.done).forEach(pl=>aP.push({s:o.l,t:pl.text}))});
  const giSx=GI_SX.filter(g=>dy.nutr?.gi&&dy.nutr.gi[g.k]).map(g=>g.l);
  const rspSup=rsp.support_type?(RSP_SUPPORT.find(x=>x.v===rsp.support_type)?.l||rsp.support_type)+(rsp.mv_mode&&rsp.support_type==='MV'?' · '+rsp.mv_mode:''):null;
  const fmtInf=arr=>arr.length?arr.map(v=>{const d=vsLatestDose(p,v);const ps=vsPresetFor(p,v.presetId);const u=ps?ps.out:(v.unit||'');return v.drug.split(' ')[0]+' '+(d==null?'—':vsFmtDose(d))+(u?' '+u:'')}).join(' · '):'none';
  return {
    date:t, patient:p, dy:dy,
    statusBadges:[ph?ph.l:null,'VIS '+v.t,(an&&an.pf!=null&&an.pf<=300?((an.pf<=100?'Severe':an.pf<=200?'Mod':'Mild')+' ARDS'):null),(k>0?'KDIGO '+k:null),dl,(nrs.risk?'NRS '+nrs.total:null)].concat(mcs.map(x=>x.type)).filter(Boolean),
    neuro:'GCS '+(gT||'—')+(iT?'T':'')+' · RASS '+txtN(nm.rass),
    sap:fmtInf(ninf),
    vitals:'MAP '+txtN(m.map)+' · HR '+txtN(m.hr)+' · Lac '+txtN(m.lac,2)+(m.scvo2!=null?' · ScvO2 '+m.scvo2+'%':'')+(dy.hemo&&dy.hemo.crt?' · CRT '+dy.hemo.crt:'')+(m.ci_method?' · '+m.ci_method+': CI '+txtN(m.ci,1)+(m.svri!=null?' SVRI '+txtN(m.svri):'')+(m.gedi!=null?' GEDI '+txtN(m.gedi):'')+(m.evlwi!=null?' EVLWI '+txtN(m.evlwi,1):''):''),
    vaso:fmtInf(vas),
    mcs:mcs.length?mcs.map(x=>x.type+(x.subtype?' ('+x.subtype+')':'')).join(' · '):'none',
    resp:(rspSup?rspSup+' · ':'')+'SpO2 '+txtN(rsp.spo2)+'% · PEEP '+txtN(rsp.peep)+' · FiO2 '+txtN(rsp.fio2)+'%'+(rsp.tv!=null?' · Vt '+txtN(rsp.tv,1):'')+(rsp.p_insp!=null?' · P-insp '+txtN(rsp.p_insp):'')+(rsp.rr!=null?' · RR '+txtN(rsp.rr):''),
    abg:ab, abgAn:an,
    renal:'Cr '+txtN(rm.cr,2)+' · KDIGO '+(k??'—')+' · '+(dl||'no RRT')+(dl&&ufT_>0?' · net UF '+ufT_+' mL':''),
    fluid:'UO '+txtN(rm.uo_ml)+' mL · Today '+(bal!=null?(bal>0?'+':'')+Math.round(bal):'—')+' · Cum '+(cb>0?'+':'')+cb.toLocaleString(),
    lytes:'Na '+txtN(lm.na)+' · K '+txtN(lm.k,1)+' · Cl '+txtN(lm.cl)+' · iCa '+txtN(lm.ica,2),
    cbc:'Hb '+txtN(hm.hb,1)+' · Plt '+txtN(hm.plt)+(txfLine(dy)?' · Tx '+txfLine(dy):'')+' · INR '+txtN(hm.inr,2),
    inf:'Tmax '+txtN(im.tmax,1)+'°C · WBC '+txtN(im.wbc,1)+' · CRP '+txtN(im.crp),
    abx:aA.length?aA.map(a=>a.drug+' '+(a.dose||'')+' d'+dot(a,t)).join('; '):'none',
    nrsLine:(nrs.init?nrs.total+' ('+(nrs.risk?'at risk':'no risk')+')':'not screened'),
    glyc:gluLine(dy),
    bowel:bowelLine(dy),
    nutrTarget:fmtN(dy.nutr?.target_kcal,0)+' kcal · '+fmtN(dy.nutr?.target_protein,1)+' g protein'+(dy.nutr?.rq!=null?' · RQ '+dy.nutr.rq.toFixed(2):''),
    nutrAch:txtN(ft.kcal,0)+' kcal ('+(kPct==null?'—':kPct+'%')+') · '+txtN(ft.protein,1)+' g ('+(pPct==null?'—':pPct+'%')+')',
    feeding:(dy.nutr?.feedings||[]).filter(f=>f.active).map(f=>f.route+' '+(f.formula||'')+(f.pn_type?' ('+f.pn_type+' '+(f.volume_ml||'?')+'mL)':'')+' — '+txtN(f.kcal,0)+' kcal/'+txtN(f.protein,1)+'g'),
    giSx:giSx,
    allergy:al,
    events24:dy?.events?.e24||[], events8:dy?.events?.e8||[],
    plans:aP
  };
}

  const cellHemo=(dy)=>{const m=dy?.hemo?.monitor||{};if(m.map==null&&m.hr==null&&m.lac==null&&!m.ci_method)return '—';return 'MAP '+txtN(m.map)+' HR '+txtN(m.hr)+(m.lac!=null?' Lac '+txtN(m.lac,2):'')+(m.ci_method?' | '+m.ci_method+' CI '+txtN(m.ci,1)+(m.svri!=null?'/SVRI '+txtN(m.svri):'')+(m.gedi!=null?'/GEDI '+txtN(m.gedi):'')+(m.evlwi!=null?'/EVLW '+txtN(m.evlwi,1):''):'')};
  const cellResp=(dy)=>{const rm=dy?.resp?.monitor||{};if(!rm.support_type&&rm.spo2==null&&rm.peep==null&&rm.fio2==null)return '—';const st=rm.support_type?(RSP_SUPPORT.find(x=>x.v===rm.support_type)?.l.replace('Non-rebreather','NRM').replace('Face mask','FM').replace('Mech ventilation','MV').replace('Room air','RA').replace('Nasal cannula','NC')||rm.support_type):null;return (st?st+(rm.mv_mode&&rm.support_type==='MV'?' '+rm.mv_mode:'')+' ':'')+'SpO2 '+txtN(rm.spo2)+'/FiO2 '+txtN(rm.fio2)+(rm.peep!=null?' PEEP '+txtN(rm.peep):'')+(rm.p_insp!=null?' Pi '+txtN(rm.p_insp):'')};

  const cellHeme=(dy)=>{const hm=dy?.heme?.monitor||{};if(hm.hb==null&&hm.plt==null)return '—';return 'Hb '+txtN(hm.hb,1)+' Plt '+txtN(hm.plt)+(hm.inr!=null?' INR '+txtN(hm.inr,2):'')};
  const cellInf=(dy)=>{const im=dy?.inf?.monitor||{};if(im.tmax==null&&im.wbc==null&&im.crp==null)return '—';return (im.tmax!=null?'T '+txtN(im.tmax,1)+'° ':'')+(im.wbc!=null?'WBC '+txtN(im.wbc,1)+' ':'')+(im.crp!=null?'CRP '+txtN(im.crp):'')};

    {lbl:'Hemo',cells:days.map(dk=>cellHemo(p.days[dk]))},
    {lbl:'Resp',cells:days.map(dk=>cellResp(p.days[dk]))},
    {lbl:'Renal/Fluid',cells:days.map(dk=>cellRenal(p.days[dk],dk))},
    {lbl:'Heme',cells:days.map(dk=>cellHeme(p.days[dk]))},
    {lbl:'Infection',cells:days.map(dk=>cellInf(p.days[dk]))},
    {lbl:'Nutrition',cells:days.map(dk=>cellNutr(p.days[dk]))},
    {lbl:'Surgery',cells:days.map(dk=>cellSurg(dk))},
    {lbl:'Plan',cells:days.map(dk=>cellPlan(p.days[dk]))}
  ];
  /* Compute col widths */
  const LBL_W=14;
  const colW=days.map((dk,i)=>{let w=Math.max(dk.length,10);rows.forEach(r=>{w=Math.max(w,r.cells[i].length)});return Math.min(w,30)});
  /* Word-wrap a cell content into lines of <= width */
  const wrap=(s,w)=>{if(s.length<=w)return [s];const out=[];const words=s.split(' ');let cur='';words.forEach(word=>{if(!cur){cur=word.length>w?word.slice(0,w):word;if(word.length>w)out.push(cur)+(cur='');}else if(cur.length+1+word.length<=w){cur+=' '+word}else{out.push(cur);cur=word.length>w?word.slice(0,w):word;if(word.length>w){out.push(cur);cur=''}}});if(cur)out.push(cur);return out};
  /* Build separator */
  const sep='+'+txtLine('-',LBL_W+2)+'+'+colW.map(w=>txtLine('-',w+2)+'+').join('');
  let s='';
  s+=title+'\n';
  if(subtitle) s+=subtitle+'\n';
  s+='\n';
  s+=sep+'\n';
  s+='| '+txtPad('Day',LBL_W)+' |'+days.map((dk,i)=>{const d=new Date(dk+'T00:00:00');const wd=d.toLocaleDateString('en-US',{weekday:'short'});return ' '+txtPad(dk+' '+wd,colW[i])+' |'}).join('')+'\n';
  s+=sep+'\n';
  rows.forEach(r=>{
    /* Wrap each cell, find max line count */
    const wrapped=r.cells.map((c,i)=>wrap(c,colW[i]));
    const maxLines=Math.max(1,...wrapped.map(w=>w.length));
    for(let li=0;li<maxLines;li++){
      s+='| '+txtPad(li===0?r.lbl:'',LBL_W)+' |';
      wrapped.forEach((w,i)=>{s+=' '+txtPad(w[li]||'',colW[i])+' |'});
      s+='\n';
    }
    s+=sep+'\n';
  });
  return s;
}

/* -------- Top-level dispatcher: full sheet (today + last 7 + entire stay) -------- */
function genSheetText(p,mode){
  const allDays=Object.keys(p.days).sort();
  if(!allDays.length) return '(no data)';
  const t=allDays[allDays.length-1];
  const last7=allDays.slice(-7);
  let out='';
  if(mode==='md'){
    out+=txtDayMD(p,t);
    if(allDays.length>=2){
      out+='\n\n---\n\n# SICU Weekly Summary\n\n'+(last7.length===7?'Last 7 days':last7.length+'-day window')+' · '+last7[0]+' → '+last7[last7.length-1]+'\n\n';
      out+='```\n'+txtRangeASCII(p,last7,'',null)+'```\n';
      out+='\n\n---\n\n# SICU Stay Summary\n\nFull ICU course · '+allDays.length+' days · '+allDays[0]+' → '+t+'\n\n';
      out+='```\n'+txtRangeASCII(p,allDays,'',null)+'```\n';
    }
  } else if(mode==='ascii'){
    out+=txtRangeASCII(p,[t],'SICU Daily Round Sheet — '+t,p.name+' · '+p.age+p.sex+' · '+p.bed+' · MRN '+p.mrn+' · ICU d'+p.los);
    if(allDays.length>=2){
      out+='\n\n';
      out+=txtRangeASCII(p,last7,'SICU Weekly Summary',(last7.length===7?'Last 7 days':last7.length+'-day window')+' · '+last7[0]+' → '+last7[last7.length-1]);
      out+='\n\n';
      out+=txtRangeASCII(p,allDays,'SICU Stay Summary','Full ICU course · '+allDays.length+' days · '+allDays[0]+' → '+t);
    }
  } else { /* plain */
    out+=txtDayPlain(p,t);
    if(allDays.length>=2){
      out+='\n\n'+txtLine('=',72)+'\n';
      out+='SICU WEEKLY SUMMARY  ·  '+(last7.length===7?'Last 7 days':last7.length+'-day window')+' · '+last7[0]+' → '+last7[last7.length-1]+'\n';
      out+=txtLine('=',72)+'\n\n';
      out+=txtRangeASCII(p,last7,'','');
      out+='\n'+txtLine('=',72)+'\n';
      out+='SICU STAY SUMMARY  ·  '+allDays.length+' days · '+allDays[0]+' → '+t+'\n';
      out+=txtLine('=',72)+'\n\n';
      out+=txtRangeASCII(p,allDays,'','');
    }
  }
  return out;
}

/* ===== v14.6.0 — Organ trend diagrams (infection fever-curve) ===== */
function dnum(ds){return Math.floor(new Date(ds+'T00:00:00').getTime()/86400000);}
function tempZone(t){return t==null?'':(t>=39?'d':(t>=37.8?'w':'s'));}
function zoneCol(z){return z==='d'?'var(--color-border-danger)':(z==='w'?'var(--color-border-warning)':'var(--color-border-success)');}
function infSeries(p){
  const dks=Object.keys(p.days||{}).sort();
  return dks.map(function(dk){
    const dy=p.days[dk]||{};const o=dy.inf||{};const m=o.monitor||{};
    const snaps=(o.snapshots||[]).slice().sort(function(a,b){return (a.time||'').localeCompare(b.time||'')});
    const lastV=function(k){for(var i=snaps.length-1;i>=0;i--){var v=snaps[i].values?snaps[i].values[k]:null;if(v!=null&&v!=='')return +v}return (m[k]!=null&&m[k]!=='')?+m[k]:null};
    var temps=snaps.map(function(s){return s.values?s.values.tmax:null}).filter(function(v){return v!=null&&v!==''}).map(Number);
    if(!temps.length&&m.tmax!=null&&m.tmax!=='')temps=[+m.tmax];
    return {dk:dk,temps:temps,tmax:temps.length?Math.max.apply(null,temps):null,tmin:temps.length?Math.min.apply(null,temps):null,wbc:lastV('wbc'),crp:lastV('crp'),pct:lastV('pct')};
  });
}
function infHasData(p){const s=infSeries(p);return s.some(function(d){return d.tmax!=null||d.wbc!=null||d.crp!=null||d.pct!=null})||((p.antibiotics||[]).length>0);}
/* Integrated fever-curve SVG: temp band+Tmax line (left °C axis), WBC/PCT normalized overlay lines, abx lanes, +culture markers */
function svgFever(p){
  const ser=infSeries(p);
  if(!ser.length)return '<p class="em">No days recorded.</p>';
  const W=760,PL=48,PR=W-54,PT=22,PB=232;

  const xFor=function(ds){var v=(dnum(ds)-d0)/span;if(v<0)v=0;if(v>1)v=1;return PL+(PR-PL)*v;};
  const TLO=35,THI=41;const yT=function(t){var v=(t-TLO)/(THI-TLO);if(v<0)v=0;if(v>1)v=1;return PB-(PB-PT)*v;};
  var g=[];
  for(var c=36;c<=40;c++){var y=yT(c);g.push('<line x1="'+PL+'" y1="'+y+'" x2="'+PR+'" y2="'+y+'" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>');g.push('<text x="'+(PL-6)+'" y="'+(y+3)+'" text-anchor="end" font-size="9" fill="var(--color-text-tertiary)">'+c+'</text>');}
  var yF=yT(38);g.push('<line x1="'+PL+'" y1="'+yF+'" x2="'+PR+'" y2="'+yF+'" stroke="var(--color-border-warning)" stroke-width="0.8" stroke-dasharray="4 3"/>');
  g.push('<text x="'+(PL-6)+'" y="'+(PT-8)+'" text-anchor="end" font-size="9" fill="var(--color-text-tertiary)">°C</text>');
  ser.forEach(function(d){var x=xFor(d.dk);var dt=new Date(d.dk+'T00:00:00');var lab=(dt.getMonth()+1)+'/'+dt.getDate();g.push('<line x1="'+x+'" y1="'+PB+'" x2="'+x+'" y2="'+(PB+3)+'" stroke="var(--color-text-tertiary)" stroke-width="0.5"/>');g.push('<text x="'+x+'" y="'+(PB+14)+'" text-anchor="middle" font-size="9" fill="var(--color-text-tertiary)">'+lab+'</text>');});
  var tpts=[];
  ser.forEach(function(d){var x=xFor(d.dk);if(d.tmax==null)return;var col=zoneCol(tempZone(d.tmax));
    if(d.tmin!=null&&d.tmin!==d.tmax){g.push('<line x1="'+x+'" y1="'+yT(d.tmin)+'" x2="'+x+'" y2="'+yT(d.tmax)+'" stroke="'+col+'" stroke-width="3" stroke-linecap="round" opacity="0.55"/>');g.push('<circle cx="'+x+'" cy="'+yT(d.tmin)+'" r="2" fill="'+col+'" opacity="0.7"/>');}
    tpts.push([x,yT(d.tmax),col]);});
  if(tpts.length>1)g.push('<polyline fill="none" stroke="var(--color-text-secondary)" stroke-width="1.5" points="'+tpts.map(function(q){return q[0]+','+q[1]}).join(' ')+'"/>');
  tpts.forEach(function(q){g.push('<circle cx="'+q[0]+'" cy="'+q[1]+'" r="3.2" fill="'+q[2]+'"/>');});
  function normLine(key,col,dash,tag){
    var vals=ser.map(function(d){return d[key]});var present=vals.filter(function(v){return v!=null});if(!present.length)return;
    var lo=Math.min.apply(null,present),hi=Math.max.apply(null,present);var rng=(hi-lo)||1;var top=PT+8,bot=PB-8;
    var yN=function(v){return bot-(bot-top)*((v-lo)/rng)};var pts=[];
    ser.forEach(function(d){if(d[key]==null)return;pts.push([xFor(d.dk),yN(d[key]),d[key]]);});
    if(pts.length>1)g.push('<polyline fill="none" stroke="'+col+'" stroke-width="1.4" stroke-dasharray="'+dash+'" points="'+pts.map(function(q){return q[0]+','+q[1]}).join(' ')+'"/>');
    pts.forEach(function(q){g.push('<circle cx="'+q[0]+'" cy="'+q[1]+'" r="2.2" fill="'+col+'"/>');});
    var last=pts[pts.length-1];if(last){var lx=last[0]-6,ly=last[1]-6;_endLabels.forEach(function(py){if(Math.abs(ly-py)<12)ly=py+12;});if(ly<PT+8)ly=PT+8;if(ly>PB-4)ly=PB-4;_endLabels.push(ly);g.push('<text x="'+lx+'" y="'+ly+'" text-anchor="end" font-size="9" fill="'+col+'">'+tag+' '+fmtN(last[2])+'</text>');}
  }
  var _endLabels=[];
  normLine('wbc','#6366F1','5 3','WBC');
  normLine('pct','#DB2777','2 3','PCT');
  (p.cultures||[]).forEach(function(cx){if((cx.status||'').toLowerCase()!=='positive'||!cx.date)return;var x=xFor(cx.date);var y=PB+22;g.push('<path d="M'+x+' '+(y-5)+' L'+(x-4)+' '+(y+2)+' L'+(x+4)+' '+(y+2)+' Z" fill="var(--color-border-danger)"><title>'+E((cx.organism||'positive')+' · '+cx.date)+'</title></path>');});
  var laneY=PB+34;var laneH=15;
  (p.antibiotics||[]).forEach(function(a){var x1=xFor(a.startDate||ser[0].dk);var x2=a.stopDate?xFor(a.stopDate):PR;var col=(a.mode==='targeted')?'var(--color-border-success)':'var(--color-border-info)';
    g.push('<rect x="'+x1+'" y="'+laneY+'" width="'+Math.max(3,x2-x1)+'" height="'+(laneH-4)+'" rx="3" fill="'+col+'" opacity="0.85"><title>'+E((a.drug||'')+' '+(a.dose||''))+'</title></rect>');
    g.push('<text x="2" y="'+(laneY+laneH-5)+'" font-size="8" fill="var(--color-text-secondary)">'+E((a.drug||'').split(' ')[0])+'</text>');
    laneY+=laneH;});
  var H=laneY+6;
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" preserveAspectRatio="xMidYMid meet" font-family="inherit" style="display:block">'+g.join('')+'</svg>';
}

/* Two stacked panels (Calories · Protein): daily actual bars (achievement-coloured)

function svgNutr(p){

function specToggle(p,dk,itemId,val){if(!p||!p.days[dk])return;var dy=p.days[dk];if(!dy.spec_check)dy.spec_check={};dy.spec_check[itemId]=!!val;}
function specBadge(p){var sp=specOf(p);if(sp.id==='general')return '';return '<span class="bc-pill" style="background:'+sp.color+';color:#fff;border-color:'+sp.color+'">'+sp.label+'</span>';}
function rSpecCard(p,dk){var sp=specOf(p);if(!p||sp.id==='general'||!sp.checklist.length||!dk||!p.days[dk])return '';var st=specChkState(p.days[dk]);var c=specChkCount(p,dk);
  var h='<div class="spec-card" style="background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-left:3px solid '+sp.color+';border-radius:var(--border-radius-lg);padding:10px 12px;margin-bottom:10px">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><div style="font-weight:700;font-size:13px"><i class="ti ti-checklist"></i> '+sp.label+' \u2014 care focus</div><span class="se" id="spec-prog" style="font-size:11px;padding:1px 7px">'+c.done+'/'+c.total+'</span></div>';
  h+=sp.checklist.map(function(it){var on=!!st[it.id];return '<label style="display:flex;align-items:flex-start;gap:8px;padding:3px 0;font-size:12px;line-height:1.35;cursor:pointer"><input type="checkbox" data-speck="'+it.id+'" '+(on?'checked':'')+' style="width:auto;margin-top:2px"><span style="'+(on?'opacity:.55;text-decoration:line-through':'')+'">'+it.label+'</span></label>';}).join('');
  h+='</div>';return h;}

/* ===== v14.13.0 — User-editable specialty library (built-ins locked + duplicate-to-customize) =====
   User specs live in S.specs (persisted under SK, exported/merged like vsPresets).
   specCatalog() = built-in SPEC (locked) ++ S.specs (editable). Stable ids preserved on edit. */
const SPEC_PILLS=[{k:'inf',l:'Infection'},{k:'hemo',l:'Hemo'},{k:'renal',l:'Renal'},{k:'resp',l:'Resp'},{k:'nutr',l:'Nutrition'},{k:'sofa',l:'Severity'},{k:'heme',l:'Hematology'}];
const SPEC_SWATCHES=['#6B7280','#E24B4A','#D97706','#1D9E75','#0891B2','#2563EB','#7C3AED','#DB2777'];
function specIsBuiltin(id){for(var i=0;i<SPEC.length;i++)if(SPEC[i].id===id)return true;return false;}
function specFind(id){var C=specCatalog();for(var i=0;i<C.length;i++)if(C[i].id===id)return C[i];return null;}
function specChipStyle(on){var base='font-size:12px;border-radius:14px;padding:4px 10px;cursor:pointer;';return on?base+'background:var(--color-background-info);color:var(--color-text-info);border:.5px solid var(--color-border-info)':base+'background:var(--color-background-secondary);color:var(--color-text-secondary);border:.5px solid var(--color-border-tertiary)';}
function specChkRow(iid,label){return '<div class="sp-itrow" data-itid="'+E(iid||'')+'" style="display:flex;gap:6px;margin-bottom:5px;align-items:center"><input type="text" value="'+E(label||'')+'" placeholder="Checklist item" style="flex:1"><button type="button" class="se" data-itdel><i class="ti ti-x"></i></button></div>';}
function specRow(s,builtin){var n=(s.checklist||[]).length;var meta=n+' item'+(n===1?'':'s');var acts=builtin?'<button data-spdup="'+s.id+'">Duplicate</button>':'<button data-sped="'+s.id+'">Edit</button><button data-spdup="'+s.id+'">Duplicate</button><button data-spdel="'+s.id+'">Del</button>';return '<div class="psc"><div class="ps-drug"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:'+s.color+';margin-right:6px;vertical-align:middle"></span>'+E(s.label)+(builtin?' <span style="font-size:10px;color:var(--color-text-tertiary)"><i class="ti ti-lock"></i> built-in</span>':'')+'</div><div class="ps-range">'+meta+'</div><div class="ps-acts">'+acts+'</div></div>';}

function oSpecMgr(returnCb){
  S.specs=Array.isArray(S.specs)?S.specs:[];
  var h='<h3>Specialties <span style="font-size:11px;color:var(--color-text-secondary);font-weight:400">\u00b7 shared across all patients</span></h3>';
  h+='<div style="max-height:60vh;overflow:auto;margin:4px 0">';
  SPEC.forEach(function(s){if(s.id!=='general')h+=specRow(s,true);});
  if(S.specs.length){h+='<div class="psc-cat">Custom \u00b7 '+S.specs.length+'</div>';S.specs.forEach(function(s){h+=specRow(s,false);});}
  h+='</div>';
  h+='<button class="btn" id="spec-new" style="width:100%;margin-top:4px"><i class="ti ti-plus"></i> New specialty</button>';
  h+='<div class="ma" style="margin-top:12px"><button class="btn" data-cn>Done</button><button class="btn pri" data-ok style="display:none"></button></div>';
  oM(h,function(){return true},true);
  document.querySelector('[data-cn]').onclick=function(){document.getElementById('mbg').classList.remove('on');if(returnCb)returnCb();};
  document.getElementById('spec-new').onclick=function(){oSpecEdit(null,function(){oSpecMgr(returnCb);});};
  document.querySelectorAll('[data-spdup]').forEach(function(b){b.onclick=function(){specDuplicate(b.dataset.spdup,returnCb);};});
  document.querySelectorAll('[data-sped]').forEach(function(b){b.onclick=function(){oSpecEdit(b.dataset.sped,function(){oSpecMgr(returnCb);});};});
  document.querySelectorAll('[data-spdel]').forEach(function(b){b.onclick=function(){var s=specFind(b.dataset.spdel);if(!s)return;if(!confirm('Delete specialty "'+s.label+'"?\n\nPatients using it fall back to General. Saved checklist ticks for its items are ignored.'))return;S.specs=S.specs.filter(function(x){return x.id!==b.dataset.spdel;});sv();oSpecMgr(returnCb);};});
}
function specDuplicate(id,returnCb){
  var src=specFind(id);if(!src)return;S.specs=Array.isArray(S.specs)?S.specs:[];
  var copy={id:ud('spc'),label:src.label+' (copy)',color:src.color,pinnedPills:(src.pinnedPills||[]).slice(),pinnedOrgans:(src.pinnedOrgans||[]).slice(),checklist:(src.checklist||[]).map(function(it){return {id:ud('spk'),label:it.label};}),extraPanels:[]};
  S.specs.push(copy);sv();oSpecEdit(copy.id,function(){oSpecMgr(returnCb);});
}
function oSpecEdit(id,returnToMgr){
  S.specs=Array.isArray(S.specs)?S.specs:[];
  var ex=id?S.specs.find(function(x){return x.id===id;}):null;
  var f=ex?{label:ex.label,color:ex.color,pinnedPills:(ex.pinnedPills||[]).slice(),pinnedOrgans:(ex.pinnedOrgans||[]).slice(),checklist:(ex.checklist||[]).map(function(it){return {id:it.id,label:it.label};})}:{label:'',color:SPEC_SWATCHES[1],pinnedPills:[],pinnedOrgans:[],checklist:[]};
  var pillChips=SPEC_PILLS.map(function(p){var on=f.pinnedPills.indexOf(p.k)>=0;return '<button type="button" data-pill="'+p.k+'" data-on="'+(on?1:0)+'" style="'+specChipStyle(on)+'">'+p.l+'</button>';}).join('');
  var orgChips=ORG.map(function(o){var on=f.pinnedOrgans.indexOf(o.i)>=0;return '<button type="button" data-org="'+o.i+'" data-on="'+(on?1:0)+'" style="'+specChipStyle(on)+'">'+o.l+'</button>';}).join('');
  var rows=f.checklist.map(function(it){return specChkRow(it.id,it.label);}).join('');
  var sw=SPEC_SWATCHES.map(function(c){return '<button type="button" data-sw="'+c+'" style="width:24px;height:24px;border-radius:4px;border:none;cursor:pointer;background:'+c+';outline:'+(c.toLowerCase()===(f.color||'').toLowerCase()?'2px solid var(--color-text-primary)':'none')+';outline-offset:1px"></button>';}).join('');
  var h='<h3>'+(ex?'Edit':'New')+' specialty</h3>';
  h+='<label>Name</label><input type="text" id="sp-label" value="'+E(f.label)+'" placeholder="e.g. Liver transplant">';
  h+='<label style="margin-top:8px">Colour</label><div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap"><input type="color" id="sp-color" value="'+E(f.color||'#6B7280')+'" style="width:40px;height:28px;padding:0;border:none;background:none">'+sw+'</div>';
  h+='<label style="margin-top:10px">Pin trend pills</label><div id="sp-pills" style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px">'+pillChips+'</div>';
  h+='<label style="margin-top:10px">Pin organ tabs</label><div id="sp-orgs" style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px">'+orgChips+'</div>';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px"><label style="margin:0">Care-focus checklist</label><button type="button" class="se" id="sp-add-item"><i class="ti ti-plus"></i> Add item</button></div><div id="sp-items" style="margin-top:4px">'+rows+'</div>';
  h+='<div class="ma" style="margin-top:14px"><button class="btn" data-cn>Cancel</button><button class="btn pri" data-ok>Save</button></div>';
  oM(h,function(){return true},true);
  document.querySelectorAll('[data-sw]').forEach(function(b){b.onclick=function(){document.getElementById('sp-color').value=b.dataset.sw;document.querySelectorAll('[data-sw]').forEach(function(x){x.style.outline='none';});b.style.outline='2px solid var(--color-text-primary)';};});
  function bindChip(sel){document.querySelectorAll(sel).forEach(function(b){b.onclick=function(){var on=b.dataset.on!=='1';b.dataset.on=on?'1':'0';b.setAttribute('style',specChipStyle(on));};});}
  bindChip('#sp-pills [data-pill]');bindChip('#sp-orgs [data-org]');
  function bindItemDel(){document.querySelectorAll('#sp-items [data-itdel]').forEach(function(b){b.onclick=function(){var r=b.parentNode;if(r)r.parentNode.removeChild(r);};});}
  document.getElementById('sp-add-item').onclick=function(){var w=document.createElement('div');w.innerHTML=specChkRow('','');document.getElementById('sp-items').appendChild(w.firstChild);bindItemDel();};
  bindItemDel();
  document.querySelector('[data-cn]').onclick=function(){returnToMgr();};
  document.querySelector('[data-ok]').onclick=function(){
    var label=document.getElementById('sp-label').value.trim();
    if(!label){alert('Name is required');return;}
    var color=document.getElementById('sp-color').value||'#6B7280';
    var pills=[];SPEC_PILLS.forEach(function(p){var el=document.querySelector('#sp-pills [data-pill="'+p.k+'"]');if(el&&el.dataset.on==='1')pills.push(p.k);});
    var orgs=[];ORG.forEach(function(o){var el=document.querySelector('#sp-orgs [data-org="'+o.i+'"]');if(el&&el.dataset.on==='1')orgs.push(o.i);});
    var items=[];document.querySelectorAll('#sp-items .sp-itrow').forEach(function(row){var inp=row.querySelector('input');var t=inp?inp.value.trim():'';if(!t)return;var iid=row.dataset.itid||ud('spk');items.push({id:iid,label:t});});
    if(ex){ex.label=label;ex.color=color;ex.pinnedPills=pills;ex.pinnedOrgans=orgs;ex.checklist=items;ex.extraPanels=ex.extraPanels||[];}
    else{S.specs.push({id:ud('spc'),label:label,color:color,pinnedPills:pills,pinnedOrgans:orgs,checklist:items,extraPanels:[]});}
    sv();returnToMgr();
  };
}

/* ===== v14.14.0 — Glycemic control: glucose snapshots + insulin (infusion/sliding/basal-bolus) + trend ===== */
/* Data model (all inside day.nutr; persists with patients automatically):
   patient.bg_target_lo (default 140), patient.bg_target_hi (default 180)
   nutr.glucose = {snapshots:[{id,time,bg,note}]}
   nutr.insulin = {mode:null|'infusion'|'sliding'|'basalbolus', scaleText:'',
                   basal_name:'', basal_units:null, basal_time:'', short_name:'',
                   entries:[{id,time,kind:'rate'|'dose'|'bolus',rate?,units?,bg?,meal?,note?}]} */

const BG_HYPO=70, BG_VHIGH=250;
const INS_MODES=[{v:'infusion',l:'IV infusion'},{v:'sliding',l:'Sliding scale'},{v:'basalbolus',l:'Basal-bolus'}];
const INS_MEALS=['Breakfast','Lunch','Dinner','Bedtime','Correction'];

function bgTarget(p){const lo=(p&&p.bg_target_lo!=null)?+p.bg_target_lo:140;const hi=(p&&p.bg_target_hi!=null)?+p.bg_target_hi:180;return {lo:lo,hi:hi};}
function bgZone(bg,lo,hi){if(bg==null)return null;if(bg<BG_HYPO)return 'hypo';if(bg<lo)return 'below';if(bg<=hi)return 'in';if(bg>=BG_VHIGH)return 'vhigh';return 'high';}
function bgZoneCol(z){return z==='hypo'?'var(--color-border-danger)':z==='below'?'#2563EB':z==='in'?'var(--color-border-success)':z==='vhigh'?'var(--color-border-danger)':z==='high'?'var(--color-border-warning)':'var(--color-text-tertiary)';}
function bgZoneLbl(z){return z==='hypo'?'hypo':z==='below'?'below':z==='in'?'in range':z==='high'?'high':z==='vhigh'?'very high':'';}

function ensureGlu(dy){if(!dy.nutr)return;if(!dy.nutr.glucose||!Array.isArray(dy.nutr.glucose.snapshots))dy.nutr.glucose={snapshots:(dy.nutr.glucose&&Array.isArray(dy.nutr.glucose.snapshots))?dy.nutr.glucose.snapshots:[]};const ins=dy.nutr.insulin;if(!ins||typeof ins!=='object'){dy.nutr.insulin={mode:null,scaleText:'',basal_name:'',basal_units:null,basal_time:'',short_name:'',entries:[]};}else{if(!('mode' in ins))ins.mode=null;if(ins.scaleText==null)ins.scaleText='';if(ins.basal_name==null)ins.basal_name='';if(ins.basal_time==null)ins.basal_time='';if(ins.short_name==null)ins.short_name='';if(!Array.isArray(ins.entries))ins.entries=[];}}

function gluList(dy){ensureGlu(dy);return (dy.nutr.glucose.snapshots||[]).slice().sort((a,b)=>(a.time||'').localeCompare(b.time||''));}
function insObj(dy){ensureGlu(dy);return dy.nutr.insulin;}
function insEntries(dy){return (insObj(dy).entries||[]).slice().sort((a,b)=>(a.time||'').localeCompare(b.time||''));}
function insDayUnits(dy){const ins=insObj(dy);let u=0;(ins.entries||[]).forEach(e=>{if((e.kind==='dose'||e.kind==='bolus')&&e.units!=null&&!isNaN(+e.units))u+=+e.units;});if(ins.mode==='basalbolus'&&ins.basal_units!=null&&!isNaN(+ins.basal_units))u+=+ins.basal_units;return u;}
function insInfusionRange(dy){const rs=(insObj(dy).entries||[]).filter(e=>e.kind==='rate'&&e.rate!=null&&!isNaN(+e.rate)).map(e=>+e.rate);if(!rs.length)return null;return {min:Math.min.apply(null,rs),max:Math.max.apply(null,rs),latest:+(insEntries(dy).filter(e=>e.kind==='rate').slice(-1)[0]||{}).rate};}
function insSummary(dy){const ins=insObj(dy);if(!ins.mode)return null;if(ins.mode==='infusion'){const r=insInfusionRange(dy);return 'IV infusion'+(r?' · '+(r.latest!=null?r.latest:r.max)+' U/hr':' · no rate yet');}if(ins.mode==='sliding'){const u=insDayUnits(dy);return 'Sliding scale · '+u+' U today';}if(ins.mode==='basalbolus'){const b=(ins.basal_units!=null?ins.basal_units+'U '+(ins.basal_name||'basal'):'basal not set');return 'Basal-bolus · '+b+' + '+insDayUnits(dy)+' U/d total';}return null;}

/* ---------- Modals ---------- */
function oGluSnap(eI){const p=cP();const dy=p.days[S.currentDay];ensureGlu(dy);const arr=dy.nutr.glucose.snapshots;const ex=eI!==undefined&&arr[eI];const cur=ex||{id:ud('bg'),time:nowHM(),bg:null,note:''};const tg=bgTarget(p);
  oM('<h3>'+(ex?'Edit':'Add')+' blood glucose</h3><div class="r2"><div><label>Time</label><input type="time" id="bg-t" value="'+E(cur.time||nowHM())+'"></div><div><label>Glucose (mg/dL)</label><input type="number" id="bg-v" step="1" value="'+(cur.bg==null?'':cur.bg)+'"></div></div><label>Note</label><input type="text" id="bg-n" value="'+E(cur.note||'')+'" placeholder="e.g. pre-meal, fingerstick"><div style="font-size:11px;color:var(--color-text-secondary);margin-top:6px">Target band '+tg.lo+'–'+tg.hi+' mg/dL · hypo &lt;'+BG_HYPO+'</div><div class="ma"><button class="btn" data-cn>Cancel</button><button class="btn pri" data-ok>'+(ex?'Save':'Add')+'</button></div>',
  (b)=>{const t=b.querySelector('#bg-t').value||nowHM();const bv=b.querySelector('#bg-v').value;if(bv==='')return false;const o={id:cur.id,time:t,bg:+bv,note:b.querySelector('#bg-n').value.trim()};if(ex)arr[eI]=o;else arr.push(o);sv();rOP();});}

function oIns(){const p=cP();const dy=p.days[S.currentDay];const ins=insObj(dy);
  function modeBtns(){return '<div style="display:flex;gap:6px;margin-bottom:10px">'+INS_MODES.map(m=>'<button type="button" class="qa-opt'+(ins.mode===m.v?' on':'')+'" data-im="'+m.v+'" style="flex:1">'+m.l+'</button>').join('')+(ins.mode?'<button type="button" class="qa-opt" data-im="" title="Clear">Off</button>':'')+'</div>';}
  function fields(){if(ins.mode==='infusion')return '<div style="font-size:12px;color:var(--color-text-secondary)">Add timed rate entries (U/hr) from the panel after saving.</div>';
    if(ins.mode==='sliding')return '<label>Sliding-scale protocol</label><textarea id="ins-scale" rows="3" placeholder="e.g. 150-200: 2U, 201-250: 4U, 251-300: 6U, >300: 8U + call">'+E(ins.scaleText||'')+'</textarea><div style="font-size:11px;color:var(--color-text-secondary);margin-top:4px">Record each given dose as a timed entry from the panel.</div>';
    if(ins.mode==='basalbolus')return '<div class="r3"><div><label>Long-acting (basal)</label><input type="text" id="ins-bn" value="'+E(ins.basal_name||'')+'" placeholder="Glargine"></div><div><label>Units</label><input type="number" id="ins-bu" step="0.5" value="'+(ins.basal_units==null?'':ins.basal_units)+'"></div><div><label>Time</label><input type="time" id="ins-bt" value="'+E(ins.basal_time||'')+'"></div></div><label>Short-acting (bolus) agent</label><input type="text" id="ins-sn" value="'+E(ins.short_name||'')+'" placeholder="Aspart / Lispro"><div style="font-size:11px;color:var(--color-text-secondary);margin-top:4px">Record each mealtime/correction bolus as a timed entry from the panel.</div>';
    return '<p class="em" style="margin:4px 0">Pick an insulin mode above.</p>';}
  function harvest(){if(ins.mode==='sliding'){const e=document.getElementById('ins-scale');if(e)ins.scaleText=e.value;}if(ins.mode==='basalbolus'){const bn=document.getElementById('ins-bn'),bu=document.getElementById('ins-bu'),bt=document.getElementById('ins-bt'),sn=document.getElementById('ins-sn');if(bn)ins.basal_name=bn.value.trim();if(bu)ins.basal_units=bu.value===''?null:+bu.value;if(bt)ins.basal_time=bt.value;if(sn)ins.short_name=sn.value.trim();}}
  oM('<h3>Insulin</h3>'+modeBtns()+'<div id="ins-fields">'+fields()+'</div><div class="ma"><button class="btn" data-cn>Close</button><button class="btn pri" data-ok>Save</button></div>',
  (b)=>{harvest();sv();rOP();});
  document.querySelectorAll('[data-im]').forEach(btn=>{btn.onclick=()=>{harvest();ins.mode=btn.dataset.im||null;sv();const fc=document.getElementById('ins-fields');if(fc)fc.innerHTML=fields();document.querySelectorAll('[data-im]').forEach(x=>x.classList.toggle('on',(x.dataset.im||null)===ins.mode));};});}

function oInsEntry(eI){const p=cP();const dy=p.days[S.currentDay];const ins=insObj(dy);if(!ins.mode){oIns();return;}const ex=eI!==undefined&&ins.entries[eI];const kind=ins.mode==='infusion'?'rate':ins.mode==='sliding'?'dose':'bolus';const cur=ex||{id:ud('ie'),time:nowHM(),kind:kind};
  let body='<div class="r2"><div><label>Time</label><input type="time" id="ie-t" value="'+E(cur.time||nowHM())+'"></div>';
  if(kind==='rate'){body+='<div><label>Rate (U/hr)</label><input type="number" id="ie-r" step="0.5" value="'+(cur.rate==null?'':cur.rate)+'"></div></div>';}
  else if(kind==='dose'){body+='<div><label>Given (U)</label><input type="number" id="ie-u" step="0.5" value="'+(cur.units==null?'':cur.units)+'"></div></div><label>BG at dose (mg/dL, optional)</label><input type="number" id="ie-bg" step="1" value="'+(cur.bg==null?'':cur.bg)+'">';}
  else {body+='<div><label>Bolus (U)</label><input type="number" id="ie-u" step="0.5" value="'+(cur.units==null?'':cur.units)+'"></div></div><label>Meal</label><select id="ie-m">'+INS_MEALS.map(m=>'<option value="'+m+'" '+(cur.meal===m?'selected':'')+'>'+m+'</option>').join('')+'</select>';}
  body+='<label>Note</label><input type="text" id="ie-n" value="'+E(cur.note||'')+'"><div class="ma"><button class="btn" data-cn>Cancel</button><button class="btn pri" data-ok>'+(ex?'Save':'Add')+'</button></div>';
  oM('<h3>'+(ex?'Edit':'Add')+' insulin ('+(kind==='rate'?'rate':kind==='dose'?'SSI dose':'bolus')+')</h3>'+body,
  (b)=>{const o={id:cur.id,time:b.querySelector('#ie-t').value||nowHM(),kind:kind,note:b.querySelector('#ie-n').value.trim()};
    if(kind==='rate'){const r=b.querySelector('#ie-r').value;if(r==='')return false;o.rate=+r;}
    else if(kind==='dose'){const u=b.querySelector('#ie-u').value;if(u==='')return false;o.units=+u;const bg=b.querySelector('#ie-bg').value;o.bg=bg===''?null:+bg;}
    else {const u=b.querySelector('#ie-u').value;if(u==='')return false;o.units=+u;o.meal=b.querySelector('#ie-m').value;}
    if(ex)ins.entries[eI]=o;else ins.entries.push(o);sv();rOP();});}

/* ---------- Panel section (appended in rNutr) ---------- */
function rGlu(p){const dy=p.days[S.currentDay];ensureGlu(dy);const tg=bgTarget(p);const list=gluList(dy);const ins=insObj(dy);
  let h='<div class="sec"><div class="sh"><span class="st"><i class="ti ti-droplet-half-2-filled"></i> Glycemic control</span><span style="font-size:11px;color:var(--color-text-secondary)">target '+tg.lo+'–'+tg.hi+'</span></div>';
  /* Blood glucose */
  h+='<div class="sh" style="margin-top:2px"><span class="st" style="font-size:12px"><i class="ti ti-tint"></i> Blood glucose</span><button class="se" data-act="aglu"><i class="ti ti-plus"></i> Add</button></div>';
  if(!list.length)h+='<p class="em">No glucose readings today</p>';

/* ---------- Trend (glucose vs insulin) ---------- */
function gluHasData(p){return Object.keys(p.days||{}).some(dk=>{const dy=p.days[dk];if(!dy||!dy.nutr)return false;const g=dy.nutr.glucose;const i=dy.nutr.insulin;return (g&&Array.isArray(g.snapshots)&&g.snapshots.length)||(i&&Array.isArray(i.entries)&&i.entries.length)||(i&&i.mode);});}
function gluReadings(p){const out=[];const dks=Object.keys(p.days||{}).sort();dks.forEach((dk,di)=>{const dy=p.days[dk];if(!dy||!dy.nutr||!dy.nutr.glucose)return;(dy.nutr.glucose.snapshots||[]).forEach(s=>{if(s.bg==null)return;const tm=(s.time||'00:00').split(':');const frac=(+tm[0]*60+ (+tm[1]||0))/1440;out.push({dk:dk,di:di,frac:frac,bg:+s.bg,time:s.time});});});return out.sort((a,b)=>a.di-b.di||a.frac-b.frac);}
function svgGlu(p){const tg=bgTarget(p);const reads=gluReadings(p);const dks=Object.keys(p.days||{}).sort();
  if(!reads.length&&!gluHasData(p))return '<p class="em">No glucose readings.</p>';
  const W=760,PL=46,PR=W-14,yTop=22,yBot=210,sBot=300,sTop=232;
  const span=(dks.length-1)||1;const xForDay=(di,frac)=>{const base=PL+(PR-PL)*(di/span);const w=(PR-PL)/(span||1);return base+(frac||0)*Math.min(w,(PR-PL))*0.0+ (frac||0)*0; };
  /* place by day index + intra-day fraction within that day's slot */
  const slot=(PR-PL)/(span+1);
  const xPos=(di,frac)=>PL+ (di+ (frac||0))*( (PR-PL)/(span+1) ) + slot*0.0;
  const bgs=reads.map(r=>r.bg);const yMax=Math.max(BG_VHIGH+20,(bgs.length?Math.max.apply(null,bgs):200)*1.1,tg.hi+40);
  const yv=v=>{let t=v/yMax;if(t<0)t=0;if(t>1)t=1;return yBot-(yBot-yTop)*t;};
  let g=[];
  /* target band */
  g.push('<rect x="'+PL+'" y="'+yv(tg.hi)+'" width="'+(PR-PL)+'" height="'+Math.max(0,yv(tg.lo)-yv(tg.hi))+'" fill="var(--color-border-success)" opacity="0.12"/>');
  g.push('<line x1="'+PL+'" y1="'+yv(tg.lo)+'" x2="'+PR+'" y2="'+yv(tg.lo)+'" stroke="var(--color-border-success)" stroke-width="0.6" stroke-dasharray="4 3"/>');
  g.push('<line x1="'+PL+'" y1="'+yv(tg.hi)+'" x2="'+PR+'" y2="'+yv(tg.hi)+'" stroke="var(--color-border-success)" stroke-width="0.6" stroke-dasharray="4 3"/>');
  g.push('<text x="'+(PR)+'" y="'+(yv(tg.hi)-3)+'" text-anchor="end" font-size="8" fill="var(--color-text-secondary)">target '+tg.lo+'–'+tg.hi+'</text>');
  /* hypo line */
  g.push('<line x1="'+PL+'" y1="'+yv(BG_HYPO)+'" x2="'+PR+'" y2="'+yv(BG_HYPO)+'" stroke="var(--color-border-danger)" stroke-width="0.6" stroke-dasharray="2 2"/>');
  g.push('<text x="'+(PL+2)+'" y="'+(yv(BG_HYPO)-2)+'" font-size="8" fill="var(--color-border-danger)">hypo '+BG_HYPO+'</text>');
  /* axes */
  g.push('<line x1="'+PL+'" y1="'+yTop+'" x2="'+PL+'" y2="'+yBot+'" stroke="var(--color-border-tertiary)" stroke-width="0.6"/>');
  g.push('<line x1="'+PL+'" y1="'+yBot+'" x2="'+PR+'" y2="'+yBot+'" stroke="var(--color-border-tertiary)" stroke-width="0.6"/>');
  [0,100,200,300].forEach(t=>{if(t<=yMax){g.push('<text x="'+(PL-5)+'" y="'+(yv(t)+3)+'" text-anchor="end" font-size="8" fill="var(--color-text-tertiary)">'+t+'</text>');}});
  g.push('<text x="'+PL+'" y="'+(yTop-6)+'" font-size="11" font-weight="700" fill="var(--color-text-secondary)">Blood glucose (mg/dL)</text>');
  /* glucose line + dots */
  const pts=reads.map(r=>[xPos(r.di,r.frac),yv(r.bg),r]);
  if(pts.length>1)g.push('<polyline fill="none" stroke="var(--color-text-tertiary)" stroke-width="1.2" points="'+pts.map(q=>q[0].toFixed(1)+','+q[1].toFixed(1)).join(' ')+'"/>');
  pts.forEach(q=>{const z=bgZone(q[2].bg,tg.lo,tg.hi);g.push('<circle cx="'+q[0].toFixed(1)+'" cy="'+q[1].toFixed(1)+'" r="3" fill="'+bgZoneCol(z)+'"><title>'+E(q[2].dk+' '+(q[2].time||'')+' · '+q[2].bg+' mg/dL ('+bgZoneLbl(z)+')')+'</title></circle>');});
  /* insulin sub-strip: per-day total units bars (+ infusion marker) */
  g.push('<text x="'+PL+'" y="'+(sTop-6)+'" font-size="11" font-weight="700" fill="var(--color-text-secondary)">Insulin</text>');
  g.push('<line x1="'+PL+'" y1="'+sBot+'" x2="'+PR+'" y2="'+sBot+'" stroke="var(--color-border-tertiary)" stroke-width="0.6"/>');
  const dayU=dks.map(dk=>{const dy=p.days[dk];return dy&&dy.nutr?insDayUnits(dy):0;});
  const uMax=Math.max(1,Math.max.apply(null,dayU)*1.1);const bw=Math.min(24,Math.max(7,slot*0.5));
  dks.forEach((dk,di)=>{const dy=p.days[dk];const u=dy&&dy.nutr?insDayUnits(dy):0;const x=xPos(di+0.5,0);const inf=dy&&dy.nutr&&dy.nutr.insulin&&dy.nutr.insulin.mode==='infusion';
    if(u>0){const hgt=(sBot-sTop)*(u/uMax);g.push('<rect x="'+(x-bw/2).toFixed(1)+'" y="'+(sBot-hgt).toFixed(1)+'" width="'+bw+'" height="'+hgt.toFixed(1)+'" rx="2" fill="#7C3AED" opacity="0.8"><title>'+E(dk+': '+u+' U insulin')+'</title></rect>');g.push('<text x="'+x.toFixed(1)+'" y="'+(sBot-hgt-3).toFixed(1)+'" text-anchor="middle" font-size="8" fill="#7C3AED">'+Math.round(u)+'U</text>');}
    if(inf){const r=insInfusionRange(dy);if(r)g.push('<text x="'+x.toFixed(1)+'" y="'+(sBot+10).toFixed(1)+'" text-anchor="middle" font-size="8" fill="var(--color-text-secondary)">drip '+(r.latest!=null?r.latest:r.max)+'U/hr</text>');}
  });
  /* date axis */
  dks.forEach((dk,di)=>{const x=xPos(di+0.5,0);const dt=new Date(dk+'T00:00:00');g.push('<text x="'+x.toFixed(1)+'" y="'+(sBot+22)+'" text-anchor="middle" font-size="9" fill="var(--color-text-tertiary)">'+(dt.getMonth()+1)+'/'+dt.getDate()+'</text>');});
  const H=330;
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" preserveAspectRatio="xMidYMid meet" font-family="inherit" style="display:block">'+g.join('')+'</svg>';
}
function gluLegend(){return '<div style="display:flex;flex-wrap:wrap;gap:10px;font-size:11px;color:var(--color-text-secondary);margin-top:6px">'

function gluTable(p){const dks=Object.keys(p.days||{}).sort();
  let h='<table style="width:100%;border-collapse:collapse;font-size:11px;margin-top:8px"><thead><tr style="color:var(--color-text-tertiary)"><th style="text-align:left;padding:2px 4px">Day</th><th style="text-align:right;padding:2px 4px">BG n</th><th style="text-align:right;padding:2px 4px">min/mean/max</th><th style="text-align:left;padding:2px 4px">Insulin</th><th style="text-align:right;padding:2px 4px">U/d</th></tr></thead><tbody>';
  const tg=bgTarget(p);

function psGlu(p){var h='<div class="psh"><div><div class="pst">Glycemic Trend — Glucose vs Insulin</div><div class="pss">'+E(p.name)+' · '+p.bed+' · MRN '+p.mrn+'</div></div></div>';h+='<div style="margin-top:10px">'+svgGlu(p)+'</div>'+gluLegend()+gluTable(p);return h;}

function gluLine(dy){if(!dy||!dy.nutr)return null;const g=(dy.nutr.glucose&&dy.nutr.glucose.snapshots)||[];const bgs=g.filter(s=>s.bg!=null).map(s=>+s.bg);const ins=dy.nutr.insulin;const parts=[];if(bgs.length)parts.push('BG '+Math.min.apply(null,bgs)+'–'+Math.max.apply(null,bgs)+' ('+bgs.length+'×)');if(ins&&ins.mode)parts.push(insSummary(dy));return parts.length?parts.join(' · '):null;}

    if(g('fps'))g('fps').onchange=()=>{harvest();rerender();};

    if(g('fpn-new'))g('fpn-new').onclick=()=>{harvest();document.getElementById('mbg').classList.remove('on');oPNPreset(null,st.pn_type||'TPN',(newId)=>{st.pn_preset_id=newId;const ps=pnPresetFor(newId);if(ps)st.pn_type=ps.type;oFd(eI,st);});};
  }
  bind();
}

/* ===== v14.16.0 — Bowel movements (Bristol snapshots) + stool volume into daily I/O ===== */
/* nutr.bowel = {snapshots:[{id,time,bristol(1-7),volume_ml,note}]}; stool volume counts as daily output. */
const BRISTOL=[{v:1,l:'1 · hard lumps'},{v:2,l:'2 · lumpy sausage'},{v:3,l:'3 · cracked sausage'},{v:4,l:'4 · smooth soft'},{v:5,l:'5 · soft blobs'},{v:6,l:'6 · mushy'},{v:7,l:'7 · watery'}];
function bristolLbl(v){const x=BRISTOL.find(b=>b.v===+v);return x?x.l:(v!=null?('type '+v):'');}
function bristolShort(v){return v!=null?('B'+v):'';}
function ensureBowel(dy){if(!dy.nutr)return;if(!dy.nutr.bowel||!Array.isArray(dy.nutr.bowel.snapshots))dy.nutr.bowel={snapshots:(dy.nutr.bowel&&Array.isArray(dy.nutr.bowel.snapshots))?dy.nutr.bowel.snapshots:[]};}
function bowelList(dy){ensureBowel(dy);return dy.nutr.bowel.snapshots.slice().sort((a,b)=>(a.time||'').localeCompare(b.time||''));}
function stoolOut(dy){if(!dy||!dy.nutr||!dy.nutr.bowel||!Array.isArray(dy.nutr.bowel.snapshots))return 0;return dy.nutr.bowel.snapshots.reduce((s,x)=>s+((x.volume_ml!=null&&!isNaN(+x.volume_ml))?+x.volume_ml:0),0);}
function bowelLine(dy){if(!dy||!dy.nutr||!dy.nutr.bowel)return null;const arr=(dy.nutr.bowel.snapshots||[]);if(!arr.length)return null;const forms=arr.filter(x=>x.bristol!=null).map(x=>x.bristol);const vol=stoolOut(dy);return 'BM '+arr.length+'×'+(forms.length?' · Bristol '+forms.join(','):'')+(vol>0?' · '+vol+' mL':'');}

function oBowel(eI){const p=cP();const dy=p.days[S.currentDay];ensureBowel(dy);const arr=dy.nutr.bowel.snapshots;const ex=eI!==undefined&&arr[eI];const cur=ex||{id:ud('bm'),time:nowHM(),bristol:null,volume_ml:null,note:''};
  const bOpts='<option value="">— select —</option>'+BRISTOL.map(b=>'<option value="'+b.v+'" '+(String(cur.bristol)===String(b.v)?'selected':'')+'>'+b.l+'</option>').join('');
  oM('<h3>'+(ex?'Edit':'Add')+' bowel movement</h3><div class="r2"><div><label>Time</label><input type="time" id="bm-t" value="'+E(cur.time||nowHM())+'"></div><div><label>Volume (mL)</label><input type="number" id="bm-v" step="1" value="'+(cur.volume_ml==null?'':cur.volume_ml)+'"></div></div><label>Bristol stool form</label><select id="bm-b">'+bOpts+'</select><label>Note</label><input type="text" id="bm-n" value="'+E(cur.note||'')+'" placeholder="e.g. melena, FMS in place"><div style="font-size:11px;color:var(--color-text-secondary);margin-top:6px">Volume is added to today\'s output (fluid balance).</div><div class="ma"><button class="btn" data-cn>Cancel</button><button class="btn pri" data-ok>'+(ex?'Save':'Add')+'</button></div>',
  (b)=>{const t=b.querySelector('#bm-t').value||nowHM();const bv=b.querySelector('#bm-b').value;const vol=b.querySelector('#bm-v').value;const o={id:cur.id,time:t,bristol:bv===''?null:+bv,volume_ml:vol===''?null:+vol,note:b.querySelector('#bm-n').value.trim()};if(ex)arr[eI]=o;else arr.push(o);sv();rOP();});}

function rBowel(p){const dy=p.days[S.currentDay];ensureBowel(dy);const list=bowelList(dy);const vol=stoolOut(dy);
  let h='<div class="sec"><div class="sh"><span class="st"><i class="ti ti-toilet-paper"></i> Bowel movements'+(list.length?' <span style="font-weight:400;color:var(--color-text-secondary)">· '+list.length+'×'+(vol>0?', '+vol+' mL → IO':'')+'</span>':'')+'</span><button class="se" data-act="abm"><i class="ti ti-plus"></i> Add</button></div>';
  if(!list.length)h+='<p class="em">No bowel movement recorded today</p>';
  else {h+='<div class="vd-tl"><div class="vd-tl-day">';list.forEach(s=>{const idx=dy.nutr.bowel.snapshots.indexOf(s);h+='<div class="vd-snap"><span class="s-t">'+E(s.time||'')+'</span><span class="s-d" style="font-weight:600">'+(s.bristol!=null?E(bristolLbl(s.bristol)):'—')+'</span><span class="s-n">'+(s.volume_ml!=null?s.volume_ml+' mL':'')+(s.note?' · '+E(s.note):'')+'</span><span class="s-a"><button data-act="ebm" data-i="'+idx+'" title="Edit">✎</button><button data-act="dbm" data-i="'+idx+'" title="Delete">×</button></span></div>';});h+='</div></div>';}
  h+='</div>';return h;}

/* ===== v14.17.0 — Heme blood transfusion log (PRBC/Plt/FFP/Cryo/WBC + units) ===== */
/* heme.transfusions = [{id,time,product,units,note}] ; per-day (resets via ed()). Not counted in I/O. */
const BLOOD_PRODUCTS=[{v:'PRBC',l:'PRBC'},{v:'Plt',l:'Platelets'},{v:'FFP',l:'FFP'},{v:'Cryo',l:'Cryoprecipitate'},{v:'WBC',l:'WBC'}];
function txfLbl(v){const x=BLOOD_PRODUCTS.find(b=>b.v===v);return x?x.l:(v||'');}
function ensureTxf(dy){if(!dy.heme)dy.heme={monitor:{},support:[],plan:[],transfusions:[]};if(!Array.isArray(dy.heme.transfusions))dy.heme.transfusions=[];}
function txfList(dy){ensureTxf(dy);return dy.heme.transfusions.slice().sort((a,b)=>(a.time||'').localeCompare(b.time||''));}
function txfTotals(dy){const t={};(((dy&&dy.heme&&dy.heme.transfusions))||[]).forEach(x=>{if(x.units!=null&&!isNaN(+x.units))t[x.product]=(t[x.product]||0)+ +x.units;});return t;}
function txfLine(dy){const t=txfTotals(dy);const parts=BLOOD_PRODUCTS.filter(b=>t[b.v]>0).map(b=>b.v+' '+t[b.v]+'u');return parts.length?parts.join(' · '):null;}

function oTxf(eI){const p=cP();const dy=p.days[S.currentDay];ensureTxf(dy);const arr=dy.heme.transfusions;const ex=eI!==undefined&&arr[eI];const cur=ex||{id:ud('tx'),time:nowHM(),product:'PRBC',units:null,note:''};
  const pOpts=BLOOD_PRODUCTS.map(b=>'<option value="'+b.v+'" '+(cur.product===b.v?'selected':'')+'>'+b.l+'</option>').join('');
  oM('<h3>'+(ex?'Edit':'Add')+' transfusion</h3><div class="r3"><div><label>Time</label><input type="time" id="tx-t" value="'+E(cur.time||nowHM())+'"></div><div><label>Product</label><select id="tx-p">'+pOpts+'</select></div><div><label>Units</label><input type="number" id="tx-u" step="0.5" value="'+(cur.units==null?'':cur.units)+'"></div></div><label>Note</label><input type="text" id="tx-n" value="'+E(cur.note||'')+'" placeholder="e.g. Hb trigger, reaction, crossmatch"><div class="ma"><button class="btn" data-cn>Cancel</button><button class="btn pri" data-ok>'+(ex?'Save':'Add')+'</button></div>',
  (b)=>{const u=b.querySelector('#tx-u').value;if(u==='')return false;const o={id:cur.id,time:b.querySelector('#tx-t').value||nowHM(),product:b.querySelector('#tx-p').value,units:+u,note:b.querySelector('#tx-n').value.trim()};if(ex)arr[eI]=o;else arr.push(o);sv();rOP();});}

function rTransfuse(p){const dy=p.days[S.currentDay];ensureTxf(dy);const list=txfList(dy);const tot=txfLine(dy);
  let h='<div class="sec"><div class="sh"><span class="st"><i class="ti ti-droplet"></i> Blood transfusion'+(tot?' <span style="font-weight:400;color:var(--color-text-secondary)">· '+tot+'</span>':'')+'</span><button class="se" data-act="atx"><i class="ti ti-plus"></i> Add</button></div>';
  h+='<div style="font-size:11px;margin:2px 0 6px;display:flex;flex-wrap:wrap;gap:8px;align-items:center">';var _stay=txfStayLine(p);if(_stay)h+='<span style="color:var(--color-text-secondary)">Stay total: '+_stay+(txfStayVol(p)>0?' (~'+txfStayVol(p)+' mL)':'')+'</span>';var _vol=txfVol(dy),_auto=autoMassive(dy),_eff=effMassive(dy);if(_vol>0||(dy.heme&&dy.heme.mtp!=null)){h+='<span style="'+(_eff?'color:var(--color-text-danger);font-weight:600':'color:var(--color-text-secondary)')+'">'+(_eff?'MASSIVE \u2192 +'+_vol+' mL to balance':'not in balance')+(_auto?' (auto: PRBC\u226510U)':'')+'</span>';h+='<button class="se" data-act="smtp" data-v="'+(_eff?'off':'on')+'">'+(_eff?'Don\u2019t count':'Count to balance (MTP)')+'</button>';if(dy.heme&&dy.heme.mtp!=null)h+='<button class="se" data-act="smtp" data-v="">auto</button>';}h+='</div>';if(!list.length)h+='<p class="em">No transfusion today</p>';
  else{h+='<div class="vd-tl"><div class="vd-tl-day">';list.forEach(s=>{const idx=dy.heme.transfusions.indexOf(s);h+='<div class="vd-snap"><span class="s-t">'+E(s.time||'')+'</span><span class="s-d" style="font-weight:600">'+E(txfLbl(s.product))+' '+s.units+'u</span><span class="s-n">'+(s.note?E(s.note):'')+'</span><span class="s-a"><button data-act="etx" data-i="'+idx+'" title="Edit">✎</button><button data-act="dtx" data-i="'+idx+'" title="Delete">×</button></span></div>';});h+='</div></div>';}

/* ===== v14.18.0 — Heme trend (Hgb/Plt/INR + transfusion) · cumulative stay totals · massive→balance ===== */
const TXF_VOL={PRBC:300,FFP:250,Plt:250,Cryo:15,WBC:300};   /* mL per unit (estimate) */
const TXF_COL={PRBC:'#DC2626',FFP:'#F59E0B',Plt:'#FBBF24',Cryo:'#3B82F6',WBC:'#9CA3AF'};
const MASSIVE_PRBC=10;                                       /* PRBC units/24h → massive */

function txfVol(dy){const t=txfTotals(dy);let v=0;Object.keys(t).forEach(k=>{v+=(t[k]||0)*(TXF_VOL[k]||0)});return Math.round(v);}
function txfPRBC(dy){return txfTotals(dy).PRBC||0;}
function autoMassive(dy){return txfPRBC(dy)>=MASSIVE_PRBC;}
function effMassive(dy){const m=dy&&dy.heme?dy.heme.mtp:undefined;if(m===true)return true;if(m===false)return false;return autoMassive(dy);}
function txfBalAdd(dy){return effMassive(dy)?txfVol(dy):0;}   /* mL added to intake when massive */

function txfStayTotals(p){const t={};Object.keys(p.days||{}).forEach(dk=>{const tt=txfTotals(p.days[dk]);Object.keys(tt).forEach(k=>{t[k]=(t[k]||0)+tt[k]})});return t;}
function txfStayLine(p){const t=txfStayTotals(p);const parts=BLOOD_PRODUCTS.filter(b=>t[b.v]>0).map(b=>b.v+' '+t[b.v]+'u');return parts.length?parts.join(' · '):null;}
function txfStayVol(p){let v=0;Object.keys(p.days||{}).forEach(dk=>{v+=txfVol(p.days[dk])});return v;}

/* ---------- Heme trend (pill: Hematology) ---------- */
function hemeHasData(p){return Object.keys(p.days||{}).some(dk=>{const dy=p.days[dk];if(!dy||!dy.heme)return false;const m=dy.heme.monitor||{};return m.hb!=null||m.plt!=null||m.inr!=null||(Array.isArray(dy.heme.transfusions)&&dy.heme.transfusions.length);});}
function hemeSeries(p){const dks=Object.keys(p.days||{}).sort();return dks.map((dk,di)=>{const m=(p.days[dk].heme&&p.days[dk].heme.monitor)||{};return {dk:dk,di:di,hb:(m.hb==null?null:+m.hb),plt:(m.plt==null?null:+m.plt),inr:(m.inr==null?null:+m.inr),tx:txfTotals(p.days[dk]),txu:Object.values(txfTotals(p.days[dk])).reduce((a,b)=>a+b,0)};});}

function svgHeme(p){const dks=Object.keys(p.days||{}).sort();const S_=hemeSeries(p);
  if(!hemeHasData(p))return '<p class="em">No hematology data.</p>';
  const W=760,PL=46,PR=746,span=(dks.length-1)||1;
  const xAt=di=>dks.length===1?(PL+PR)/2:PL+(PR-PL)*(di/span);
  function panel(key,col,label,yTop,yBot,refLo,refHi){const vals=S_.map(s=>s[key]).filter(v=>v!=null);let g='';
    g+='<text x="'+PL+'" y="'+(yTop-4)+'" font-size="10" font-weight="700" fill="var(--color-text-secondary)">'+label+'</text>';
    if(!vals.length){g+='<line x1="'+PL+'" y1="'+yBot+'" x2="'+PR+'" y2="'+yBot+'" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>';return g;}
    let lo=Math.min.apply(null,vals),hi=Math.max.apply(null,vals);if(refLo!=null){lo=Math.min(lo,refLo);hi=Math.max(hi,refHi);}const pad=(hi-lo)*0.15||1;lo-=pad;hi+=pad;const yv=v=>yBot-(yBot-yTop)*((v-lo)/((hi-lo)||1));
    if(refLo!=null)g+='<rect x="'+PL+'" y="'+yv(refHi).toFixed(1)+'" width="'+(PR-PL)+'" height="'+Math.max(0,yv(refLo)-yv(refHi)).toFixed(1)+'" fill="var(--color-border-success)" opacity="0.10"/>';
    g+='<line x1="'+PL+'" y1="'+yBot+'" x2="'+PR+'" y2="'+yBot+'" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>';
    g+='<text x="'+(PL-4)+'" y="'+(yv(hi-pad)+3).toFixed(1)+'" text-anchor="end" font-size="8" fill="var(--color-text-tertiary)">'+(+(hi-pad).toFixed(hi-pad<10?1:0))+'</text>';
    g+='<text x="'+(PL-4)+'" y="'+(yv(lo+pad)+3).toFixed(1)+'" text-anchor="end" font-size="8" fill="var(--color-text-tertiary)">'+(+(lo+pad).toFixed(lo+pad<10?1:0))+'</text>';
    const pts=S_.filter(s=>s[key]!=null).map(s=>[xAt(s.di),yv(s[key])]);
    if(pts.length>1)g+='<polyline fill="none" stroke="'+col+'" stroke-width="1.4" points="'+pts.map(q=>q[0].toFixed(1)+','+q[1].toFixed(1)).join(' ')+'"/>';
    pts.forEach((q,idx)=>{const sv=S_.filter(s=>s[key]!=null)[idx];g+='<circle cx="'+q[0].toFixed(1)+'" cy="'+q[1].toFixed(1)+'" r="2.6" fill="'+col+'"><title>'+E(sv.dk+': '+sv[key])+'</title></circle>';});
    return g;}
  let g='';
  g+=panel('hb','#DC2626','Hb (g/dL)',20,74,7,14);
  g+=panel('plt','#D97706','Plt (10³/μL)',98,152,100,400);
  g+=panel('inr','#7C3AED','INR',176,230,0.8,1.2);
  /* transfusion stacked bars (units) */
  const yT0=252,yB=320;g+='<text x="'+PL+'" y="'+(yT0-4)+'" font-size="10" font-weight="700" fill="var(--color-text-secondary)">Transfusion (units)</text>';
  g+='<line x1="'+PL+'" y1="'+yB+'" x2="'+PR+'" y2="'+yB+'" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>';
  const maxU=Math.max(1,Math.max.apply(null,S_.map(s=>s.txu)));const bw=Math.min(26,Math.max(8,(PR-PL)/((dks.length||1)*1.8)));
  S_.forEach(s=>{const x=xAt(s.di);let yacc=yB;BLOOD_PRODUCTS.forEach(b=>{const u=s.tx[b.v]||0;if(u<=0)return;const hgt=(yB-yT0)*(u/maxU);g+='<rect x="'+(x-bw/2).toFixed(1)+'" y="'+(yacc-hgt).toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+hgt.toFixed(1)+'" fill="'+TXF_COL[b.v]+'"><title>'+E(s.dk+' '+b.v+' '+u+'u')+'</title></rect>';yacc-=hgt;});if(s.txu>0)g+='<text x="'+x.toFixed(1)+'" y="'+(yacc-3).toFixed(1)+'" text-anchor="middle" font-size="8" fill="var(--color-text-secondary)">'+s.txu+(effMassive(p.days[s.dk])?' ⚑':'')+'</text>';});
  /* date axis */
  S_.forEach(s=>{const x=xAt(s.di);const d=new Date(s.dk+'T00:00:00');g+='<text x="'+x.toFixed(1)+'" y="'+(yB+14)+'" text-anchor="middle" font-size="9" fill="var(--color-text-tertiary)">'+(d.getMonth()+1)+'/'+d.getDate()+'</text>';});
  return '<svg viewBox="0 0 '+W+' 336" width="100%" preserveAspectRatio="xMidYMid meet" font-family="inherit" style="display:block">'+g+'</svg>';
}
function hemeLegend(){let h='<div style="display:flex;flex-wrap:wrap;gap:10px;font-size:11px;color:var(--color-text-secondary);margin-top:6px">';
  h+='<span><i style="display:inline-block;width:10px;height:3px;background:#DC2626;vertical-align:middle"></i> Hb</span>';
  h+='<span><i style="display:inline-block;width:10px;height:3px;background:#D97706;vertical-align:middle"></i> Plt</span>';
  h+='<span><i style="display:inline-block;width:10px;height:3px;background:#7C3AED;vertical-align:middle"></i> INR</span>';
  BLOOD_PRODUCTS.forEach(b=>{h+='<span><i style="display:inline-block;width:9px;height:9px;background:'+TXF_COL[b.v]+';vertical-align:middle"></i> '+b.v+'</span>';});
  h+='<span>⚑ massive (→ balance)</span></div>';return h;}
function hemeTable(p){const S_=hemeSeries(p);
  let h='<table style="width:100%;border-collapse:collapse;font-size:11px;margin-top:8px"><thead><tr style="color:var(--color-text-tertiary)"><th style="text-align:left;padding:2px 4px">Day</th><th style="text-align:right;padding:2px 4px">Hb</th><th style="text-align:right;padding:2px 4px">Plt</th><th style="text-align:right;padding:2px 4px">INR</th><th style="text-align:left;padding:2px 4px">Transfusion</th></tr></thead><tbody>';
  S_.forEach(s=>{const d=new Date(s.dk+'T00:00:00');const tl=txfLine(p.days[s.dk]);const mv=effMassive(p.days[s.dk]);
    h+='<tr style="border-top:0.5px solid var(--color-border-tertiary)"><td style="padding:2px 4px">'+(d.getMonth()+1)+'/'+d.getDate()+'</td><td style="text-align:right;padding:2px 4px">'+(s.hb==null?'—':s.hb)+'</td><td style="text-align:right;padding:2px 4px">'+(s.plt==null?'—':s.plt)+'</td><td style="text-align:right;padding:2px 4px">'+(s.inr==null?'—':s.inr)+'</td><td style="padding:2px 4px">'+(tl?E(tl):'—')+(mv?' <span style="color:var(--color-text-danger)">⚑ +'+txfVol(p.days[s.dk])+'mL</span>':'')+'</td></tr>';});
  const st=txfStayTotals(p);const stparts=BLOOD_PRODUCTS.filter(b=>st[b.v]>0).map(b=>b.v+' '+st[b.v]+'u');
  h+='<tr style="border-top:1.5px solid var(--color-border-secondary);font-weight:700"><td style="padding:3px 4px" colspan="4">Cumulative (ICU stay)</td><td style="padding:3px 4px">'+(stparts.length?stparts.join(' · '):'—')+(txfStayVol(p)>0?' · ~'+txfStayVol(p)+' mL':'')+'</td></tr>';
  h+='</tbody></table>';return h;}
function psHeme(p){return '<div class="psh"><div><div class="pst">Hematology Trend — Hb / Plt / INR + Transfusion</div><div class="pss">'+E(p.name)+' · '+p.bed+' · MRN '+p.mrn+'</div></div></div><div style="margin-top:10px">'+svgHeme(p)+'</div>'+hemeLegend()+hemeTable(p);}

/* ===== v15.0 de-id + local PouchDB mirror (P1+P2) ===== */
/* ===== v15.0 de-identification layer (P1: pure transforms + local id-map) =====
   Real name/MRN live ONLY in localStorage 'SICU_idmap' (device-local, NEVER synced).
   PouchDB (local IndexedDB + remote CouchDB) store DE-IDENTIFIED patient docs:
     name:''  ·  mrn: first digit within the first 5 chars -> 'X' (deterministic).
   ld() hydrates real values back from the id-map where present, so the render layer
   (rL/rH/oPatient/psDay/psRange/txtDayRecord) stays untouched: in-memory = real on a
   device that has the map, de-identified everywhere else. */
const IDMAP_KEY='SICU_idmap';

/* Mask: replace the FIRST digit within the first 5 chars of the MRN with 'X'.
   Deterministic (always the same position for the same MRN -> identical string on every
   device, so sync never sees two variants). If no digit in the first 5 chars, returns the
   MRN unchanged (nothing maskable). */
function mrnMask(mrn){
  if(mrn==null)return '';
  const s=String(mrn);
  const n=Math.min(5,s.length);
  for(let i=0;i<n;i++){if(s[i]>='0'&&s[i]<='9')return s.slice(0,i)+'X'+s.slice(i+1);}
  return s;
}

/* De-identified shallow clone of a patient (real -> stored form). Only name/mrn change;
   days + all nested clinical data are carried by reference (we immediately JSON-serialize
   this for PouchDB and never mutate it, so a top-level copy is sufficient and leaves the
   in-memory S.patients[] original — with real values — untouched). */
function deidPatient(p){return Object.assign({},p,{name:'',mrn:mrnMask(p.mrn)});}

/* id-map accessors — localStorage, device-local, NEVER replicated into PouchDB. */
function idmapLoad(){try{const r=localStorage.getItem(IDMAP_KEY);const m=r?JSON.parse(r):{};return (m&&typeof m==='object')?m:{};}catch(e){return {};}}
function idmapSave(m){try{localStorage.setItem(IDMAP_KEY,JSON.stringify(m||{}));}catch(e){}}
function idmapGet(id){const m=idmapLoad();return m[id]||null;}
function idmapSet(id,name,mrn){const m=idmapLoad();m[id]={name:name||'',mrn:mrn||''};idmapSave(m);return m;}
function idmapDel(id){const m=idmapLoad();delete m[id];idmapSave(m);return m;}

/* Hydrate a de-identified patient back to real values using a provided map (or the local
   id-map). Mutates and returns p. No mapping entry -> p keeps its de-identified values. */
function hydratePatient(p,map){
  const m=map||idmapLoad();
  const e=m[p.id];
  if(e){if(e.name!=null)p.name=e.name;if(e.mrn!=null)p.mrn=e.mrn;}
  return p;
}

/* ===== v15.0 P2 — local PouchDB de-identified mirror (dual-write) =====
   localStorage(SK)  = REAL, device-local. Still the boot source + fallback (unchanged).
   PouchDB 'sicu_local' = DE-IDENTIFIED per-patient docs (patient:<id>) + meta:globals (presets/specs).
   SICU_idmap        = REAL name/mrn, device-local, derived from S on every save (for P3 hydration).
   sv() additionally calls pdbOnSave(). P3 attaches .sync(remote) and switches boot to PouchDB-first. */
let PDB=null, PDB_REVS={}, PDB_READY=false, PDB_FLUSH_T=null;

function pdbAvailable(){return typeof PouchDB!=='undefined';}

/* derive id-map (REAL name/mrn) from in-memory S; only for patients that carry a real name
   (a de-identified-only device has name:'' -> we must NOT overwrite a real entry with blanks). */
function pdbDeriveIdmap(){
  try{const m=idmapLoad();(S.patients||[]).forEach(p=>{if(p.name)m[p.id]={name:p.name,mrn:p.mrn||''};});idmapSave(m);}catch(e){}
}

/* Build the de-identified doc set + deletions and write to PouchDB. */
async function pdbFlush(){
  if(!PDB||!PDB_READY)return;
  const wanted={},docs=[];
  (S.patients||[]).forEach(p=>{
    const id='patient:'+p.id;wanted[id]=1;
    const d=Object.assign({_id:id},deidPatient(p));   // de-id boundary: name:'' , mrn masked
    if(PDB_REVS[id])d._rev=PDB_REVS[id];
    docs.push(d);
  });
  const gid='meta:globals';wanted[gid]=1;
  const g={_id:gid,vsPresets:S.vsPresets||[],pnPresets:S.pnPresets||[],specs:S.specs||[]};
  if(PDB_REVS[gid])g._rev=PDB_REVS[gid];
  docs.push(g);
  const dels=[];
  Object.keys(PDB_REVS).forEach(id=>{if(!wanted[id]&&id.indexOf('patient:')===0)dels.push({_id:id,_rev:PDB_REVS[id],_deleted:true});});
  const batch=docs.concat(dels);
  const res=await PDB.bulkDocs(batch);
  const retry=[];
  res.forEach((r,i)=>{const src=batch[i];if(r.ok){if(src._deleted)delete PDB_REVS[r.id];else PDB_REVS[r.id]=r.rev;}else if(r.status===409&&!src._deleted)retry.push(src);});
  for(const src of retry){try{const cur=await PDB.get(src._id);src._rev=cur._rev;const rr=await PDB.put(src);PDB_REVS[src._id]=rr.rev;}catch(e){console.warn('pdb retry',src._id,e);}}
}

/* Called from sv(): refresh id-map + debounced background flush. No-op until PouchDB is ready. */
function pdbOnSave(){
  if(!PDB_READY)return;
  pdbDeriveIdmap();
  if(PDB_FLUSH_T)clearTimeout(PDB_FLUSH_T);
  PDB_FLUSH_T=setTimeout(()=>{PDB_FLUSH_T=null;pdbFlush().catch(e=>console.warn('pdbFlush',e));},400);
}

/* One-time boot: open db, offer real-JSON backup on first migration, build id-map, mirror once. */
async function pdbBoot(){
  if(!pdbAvailable()){console.warn('PouchDB not loaded — de-id mirror disabled this session');return;}
  try{
    PDB=new PouchDB('sicu_local');
    const all=await PDB.allDocs();
    all.rows.forEach(r=>{PDB_REVS[r.id]=r.value.rev;});
    const hasPatients=all.rows.some(r=>r.id.indexOf('patient:')===0);
    if(!hasPatients&&(S.patients||[]).length){
      let doBackup=true;
      try{doBackup=confirm('v15.0：首次把資料遷移到本機 PouchDB。\n\n強烈建議先匯出一份「真實」JSON 備份(存到安全的地方,可隨時回退)。\n\n確定 = 現在下載備份；取消 = 略過。');}catch(e){}
      if(doBackup){try{expJSON();}catch(e){}}
    }
    PDB_READY=true;
    pdbDeriveIdmap();
    await pdbFlush();
    console.log('PouchDB de-id mirror ready — '+ (S.patients||[]).length +' patient(s)');
  }catch(e){console.warn('pdbBoot failed; staying on localStorage only:',e);PDB_READY=false;}
}

/* Hard reset (used by the Reset button): destroy local db + id-map, then re-mirror from fresh S. */
async function pdbReset(){
  try{if(PDB){await PDB.destroy();PDB=null;}}catch(e){}
  PDB_REVS={};PDB_READY=false;
  try{localStorage.removeItem(IDMAP_KEY);}catch(e){}
  await pdbBoot();
}
